function onHost(d){if(d.type==='join'){let old=host.players[d.id]||{};host.players[d.id]={id:d.id,name:String(d.name||'ゲスト').slice(0,10),score:old.score||0,wrong:old.wrong||0,eliminated:!!old.eliminated};if(host.phase==='lobby')renderHostLobby();broadcast()}if(d.type==='answer'){if(host.phase!=='question')return;let p=host.players[d.id];if(!p||p.eliminated||host.answers[d.id]!==undefined)return;host.answers[d.id]=Number(d.answer);updateHostLive();broadcast();if(Object.keys(host.answers).length>=alive().length)finishQuestion()}}
function state(){return{type:'state',phase:host.phase,roomId:room,questionIndex:host.qi,totalQuestions:Q.length,question:host.phase==='question'?{time:Q[host.qi].t,endsAt:host.endsAt}:null,result:host.result,players:host.players,ranking:ranks()}}
function broadcast(){pub(`${base}/host`,state())}function startGame(){if(!all().length){alert('参加者がまだ入室していません。');return}nextQuestion()}
function nextQuestion(){if(host.qi>=Q.length-1){host.phase='final';renderHostFinal();broadcast();return}host.qi++;host.phase='question';host.answers={};host.result=null;let q=Q[host.qi];host.remain=q.t;host.endsAt=Date.now()+q.t*1000;renderHostQuestion();broadcast();startHostTimer()}
function startHostTimer(){clearInterval(hostTimer);cancelAnimationFrame(hostRAF);hostTimer=setInterval(()=>{host.remain=Math.max(0,Math.ceil((host.endsAt-Date.now())/1000));updateHostLive();if(host.remain<=0)finishQuestion()},200);animate('hBar','timeBox',host.endsAt,Q[host.qi].t,v=>hostRAF=v)}
function animate(id,boxId,ends,total,setter){function tick(){let left=Math.max(0,(ends-Date.now())/(total*1000)),b=document.getElementById(id);if(b){b.style.transform=`scaleX(${left})`;b.style.background=left<=.25?'#EF4444':'linear-gradient(90deg,#001E62,#3B82F6)'}if(left>0)setter(requestAnimationFrame(tick))}tick()}
function renderHostQuestion(){let q=Q[host.qi];hostShell(`<section class="panel rounded-[2rem] p-7 h-full"><div class="grid lg:grid-cols-[1fr_230px] gap-5 mb-5"><p class="text-[#001E62] font-black text-2xl">第 ${host.qi+1} 問 / ${Q.length}</p><div id="timeBox" class="text-center rounded-[2rem] bg-white text-[#001E62] border px-8 py-4"><p class="font-bold">残り時間</p><p id="hTime" class="text-5xl font-black">${host.remain}</p></div></div><div class="barwrap h-4 bg-slate-200 rounded-full mb-6"><div id="hBar" class="bar"></div></div><div class="grid xl:grid-cols-[1fr_330px] gap-6"><div><h1 class="text-4xl md:text-5xl font-black leading-tight mb-7">${esc(q.ja)}</h1><div class="grid md:grid-cols-2 gap-4">${q.oJ.map((op,i)=>`<div class="rounded-3xl bg-[#F4F7FF] text-[#001E62] p-5 text-2xl font-black flex gap-4"><span class="rounded-full bg-[#001E62] text-white w-12 h-12 flex items-center justify-center shrink-0">${String.fromCharCode(65+i)}</span>${esc(op)}</div>`).join('')}</div></div><aside><div class="rounded-3xl bg-[#F4F7FF] p-7"><p class="text-slate-600 font-bold">回答状況</p><p class="text-6xl font-black text-[#001E62]"><span id="hAnswered">0</span> / <span id="hAlive">${alive().length}</span></p></div></aside></div></section>`);updateHostLive()}
function updateHostLive(){let a=Object.keys(host.answers).length;let ht=document.getElementById('hTime'),ha=document.getElementById('hAnswered'),hl=document.getElementById('hAlive');if(ht)ht.textContent=host.remain;if(ha)ha.textContent=a;if(hl)hl.textContent=alive().length}
function finishQuestion(){if(host.phase!=='question')return;clearInterval(hostTimer);cancelAnimationFrame(hostRAF);let q=Q[host.qi],counts=[0,0,0,0],voters=[[],[],[],[]];Object.entries(host.answers).forEach(([id,a])=>{if(a>=0&&a<4){counts[a]++;if(host.players[id])voters[a].push(host.players[id].name)}});all().forEach(p=>{if(p.eliminated)return;let ok=host.answers[p.id]===q.c;p.lastCorrect=ok;if(ok)p.score+=100;else{p.wrong++;if(p.wrong>=MAX_WRONG)p.eliminated=true}});host.phase='result';host.result={questionIndex:host.qi,questionText:q.ja,options:q.oJ,correct:q.c,correctText:q.oJ[q.c],counts,voters,explain:q.eJ,title:q.aJ,sub:q.sJ,kind:q.k};renderHostResult();broadcast()}
function renderHostResult(){let r=host.result;hostShell(`<section class="grid xl:grid-cols-[1.05fr_.95fr] gap-6 h-full"><div class="panel rounded-[2rem] p-6"><p class="text-[#001E62] font-black text-2xl mb-2">正解発表</p><h1 class="text-3xl font-black mb-4">${esc(r.questionText)}</h1><div class="bg-white rounded-[2rem] p-4 border" style="height:40vh"><canvas id="chart"></canvas></div><div class="grid grid-cols-2 gap-4 mt-4"><div class="rounded-2xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">生存者</p><p class="text-4xl font-black text-[#001E62]">${alive().length}</p></div><div class="rounded-2xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">脱落者</p><p class="text-4xl font-black text-[#001E62]">${all().filter(p=>p.eliminated).length}</p></div></div></div><div class="panel rounded-[2rem] p-6 flex flex-col"><div class="rounded-[2rem] gold p-5 mb-4"><p class="text-4xl font-black">${String.fromCharCode(65+r.correct)}</p><p class="text-2xl font-black">${esc(r.correctText)}</p></div>${visual(r.kind,r.title,r.sub)}<div class="rounded-3xl bg-[#F4F7FF] p-4 my-4"><p class="text-[#001E62] font-black">ちょう解説</p><p class="font-bold text-slate-700">${esc(r.explain)}</p></div><button onclick="nextQuestion()" class="btn mt-auto rounded-3xl blue py-4 font-black text-2xl">${host.qi>=Q.length-1?'ランキングへ':'次の問題へ'}</button></div></section>`);setTimeout(drawChart,0)}
function drawChart(){let r=host.result,c=document.getElementById('chart');if(!c)return;if(chart)chart.destroy();chart=new Chart(c,{type:'bar',data:{labels:r.options.map((o,i)=>`${String.fromCharCode(65+i)}. ${o}`),datasets:[{data:r.counts,backgroundColor:r.options.map((_,i)=>i===r.correct?'#FACC15':'#001E62'),borderRadius:12}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:(ctx)=>{let n=r.voters[ctx.dataIndex]||[];return n.length?'選択者：'+n.join('、'):'選択者：なし'}}}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}})}
function renderHostFinal(){hostShell(`<section class="panel rounded-[2rem] p-10 text-center h-full"><div class="text-yellow-500 mb-4">${icon('trophy','w-20 h-20')}</div><h1 class="text-6xl font-black mb-8 text-[#001E62]">ランキング</h1><div class="max-w-4xl mx-auto space-y-3">${ranks().map((p,i)=>`<div class="rounded-[2rem] ${i===0?'rank1':'rankN'} p-5 flex justify-between shadow border"><b class="text-2xl">${i+1}. ${esc(p.name)}</b><b class="text-4xl">${p.score}</b></div>`).join('')}</div></section>`)}
function renderPlayerLogin(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5 safe"><section class="panel rounded-[2rem] p-7 text-center w-full max-w-md"><img src="${LOGO}" class="logo-sm mx-auto mb-6"><select onchange="setLang(this.value);renderPlayerLogin()" class="mb-4 rounded-2xl border px-4 py-3 font-black text-[#001E62]"><option value="ja" ${lang()==='ja'?'selected':''}>日本語</option><option value="zh" ${lang()==='zh'?'selected':''}>繁體中文</option></select><p class="text-[#001E62] font-black text-xl mb-1">Room ID：${esc(room)}</p><h1 class="text-3xl font-black mb-3 text-[#001E62]">${T('name')}</h1><input id="nickname" maxlength="10" value="${esc(player.name)}" class="w-full rounded-2xl p-5 text-[#001E62] font-black text-2xl text-center outline-none mb-5 border" placeholder="${lang()==='zh'?'名字':'お名前'}"><button onclick="joinPlayer()" class="btn w-full rounded-2xl gold py-5 font-black text-xl">${T('enter')}</button><p id="msg" class="mt-5 text-slate-600 text-sm"></p></section></main>`}
function joinPlayer(){let n=document.getElementById('nickname').value.trim().slice(0,10);if(!n){document.getElementById('msg').textContent=lang()==='zh'?'請輸入暱稱。':'ニックネームを入力してください。';return}player.name=n;saveP();connect(()=>{client.subscribe(`${base}/host`);pub(`${base}/player`,{type:'join',id:player.id,name:player.name});renderPlayerWaiting(T('joined'))})}
function onPlayer(d){if(d.type!=='state')return;let me=d.players&&d.players[player.id];if(me){player.score=me.score;player.wrong=me.wrong;player.eliminated=me.eliminated;saveP()}if(player.eliminated&&d.phase!=='final'){renderPlayerEliminated();return}if(d.phase==='lobby')renderPlayerWaiting(T('joined'));if(d.phase==='question'){if(player.lastQi!==d.questionIndex){player.selected=null;player.locked=false;player.lastQi=d.questionIndex}renderPlayerQuestion(d);startPlayerTimer(d.question.endsAt,d.question.time)}if(d.phase==='result'){renderPlayerResult(d,me)}if(d.phase==='final')renderPlayerFinal(d)}
function playerShell(c,d=false){app.innerHTML=`<main id="playerMain" class="min-h-screen p-4 safe ${d?'!bg-red-900':''}"><header class="flex items-center justify-between mb-4"><img src="${LOGO}" class="logo-sm"><select onchange="setLang(this.value);renderPlayerWaiting(T('joined'))" class="rounded-xl border px-2 py-1 text-xs font-black text-[#001E62]"><option value="ja" ${lang()==='ja'?'selected':''}>日本語</option><option value="zh" ${lang()==='zh'?'selected':''}>繁中</option></select></header>${c}</main>`}
function renderPlayerWaiting(msg){playerShell(`<section class="panel rounded-[2rem] p-7 text-center min-h-[72vh] flex flex-col justify-center"><h1 class="text-3xl font-black mb-4 text-[#001E62]">${T('wait')}</h1><p class="text-slate-600 text-lg font-bold">${esc(msg)}</p><div class="mt-8 rounded-2xl bg-[#F4F7FF] p-5"><p class="font-bold text-slate-600">${lang()==='zh'?'你的名字':'あなたの名前'}</p><p class="text-3xl font-black text-[#001E62]">${esc(player.name)}</p></div></section>`)}
function renderPlayerQuestion(d){let q=Q[d.questionIndex];playerShell(`<section><div class="panel rounded-[2rem] p-5 mb-4"><div class="flex justify-between mb-3"><p class="text-[#001E62] font-black">${T('q')} ${d.questionIndex+1} / ${Q.length}</p><div id="pTimeBox" class="rounded-2xl bg-white text-[#001E62] px-4 py-2 border text-center"><p class="text-xs font-bold">${T('left')}</p><p id="pTime" class="text-3xl font-black">${d.question.time}</p></div></div><div class="barwrap h-3 bg-slate-200 rounded-full mb-4"><div id="pBar" class="bar"></div></div><h1 class="text-xl font-black">${esc(qText(q))}</h1></div><div class="space-y-3">${opts(q).map((op,i)=>`<button ${player.locked?'disabled':''} onclick="sendAnswer(${i})" class="opt btn w-full rounded-3xl p-5 text-left font-black text-lg shadow-xl ${player.selected===i?'gold':'bg-white text-[#001E62]'}"><span class="inline-flex mr-4 w-11 h-11 rounded-full bg-[#001E62] text-white items-center justify-center">${String.fromCharCode(65+i)}</span>${esc(op)}</button>`).join('')}</div><div class="mt-4 panel rounded-2xl p-4 text-center"><p id="sendMsg" class="font-black text-slate-600">${player.locked?T('sent'):T('choose')}</p><p class="mt-2 text-sm text-slate-600 font-bold">${T('wrongCount')}：${player.wrong} / ${MAX_WRONG}</p></div></section>`)}
function startPlayerTimer(ends,total){clearInterval(playerTimer);cancelAnimationFrame(playerRAF);playerTimer=setInterval(()=>{let left=Math.max(0,Math.ceil((ends-Date.now())/1000)),t=document.getElementById('pTime');if(t)t.textContent=left;if(left<=0)clearInterval(playerTimer)},200);animate('pBar','pTimeBox',ends,total,v=>playerRAF=v)}function vibrate(p){try{if(navigator.vibrate)return navigator.vibrate(p)}catch(e){}}
function sendAnswer(i){if(player.locked)return;vibrate(8);player.selected=i;player.locked=true;pub(`${base}/player`,{type:'answer',id:player.id,answer:i});document.querySelectorAll('button[onclick^="sendAnswer"]').forEach((b,idx)=>{b.disabled=true;if(idx===i)b.className=b.className.replace('bg-white text-[#001E62]','gold');else b.classList.add('opacity-45')});let m=document.getElementById('sendMsg');if(m)m.textContent=T('sent')}
function renderPlayerResult(d,me){let idx=d.result.questionIndex??player.lastQi,q=Q[idx],ok=me&&me.lastCorrect===true;if(!ok){vibrate([220,80,220,80,320]);setTimeout(()=>{let e=document.getElementById('playerMain');if(e)e.classList.add('shake')},30)}playerShell(`<section class="panel rounded-[2rem] p-5 text-center"><div class="${ok?'text-green-500':'text-red-500'} mb-4">${icon(ok?'check':'x','w-20 h-20')}</div><h1 class="text-4xl font-black ${ok?'text-green-600':'text-red-600'} mb-4">${ok?T('right'):T('wrong')}</h1><div class="rounded-3xl gold p-5 mb-4"><p class="font-bold">${T('correct')}</p><p class="text-2xl font-black">${String.fromCharCode(65+q.c)}. ${esc(opts(q)[q.c])}</p></div>${visual(q.k,aText(q),subText(q))}<div class="rounded-3xl bg-[#F4F7FF] p-4 my-4 text-left"><p class="text-[#001E62] font-black">${T('exp')}</p><p class="font-bold text-slate-700">${esc(expText(q))}</p></div><div class="rounded-3xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">${T('wrongCount')}</p><p class="text-5xl font-black text-[#001E62]">${player.wrong} / ${MAX_WRONG}</p></div><p class="mt-4 text-slate-600 font-bold">${T('next')}</p></section>`)}
function renderPlayerEliminated(){playerShell(`<section class="rounded-[2rem] bg-red-700/90 p-8 text-center min-h-[78vh] flex flex-col justify-center text-white"><h1 class="text-6xl font-black mb-4">${lang()==='zh'?'淘汰':'脱落'}</h1><p class="text-xl font-bold">${T('wrongCount')} ${player.wrong} / ${MAX_WRONG}</p></section>`,true)}
function renderPlayerFinal(d){let rk=d.ranking||[];playerShell(`<section class="panel rounded-[2rem] p-6 text-center"><h1 class="text-4xl font-black mb-6 text-[#001E62]">${T('done')}</h1><div class="rounded-3xl gold p-6 mb-6"><p class="font-bold">${T('score')}</p><p class="text-6xl font-black">${player.score}</p></div><div class="space-y-3">${rk.map((p,i)=>`<div class="rounded-2xl bg-[#F4F7FF] p-4 flex justify-between"><b>${i+1}. ${esc(p.name)}</b><b>${p.score}</b></div>`).join('')}</div></section>`)}
</script></body></html>
