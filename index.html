function makeRoom(){let c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:5},()=>c[Math.floor(Math.random()*c.length)]).join('')}function all(){return Object.values(host.players)}function alive(){return all().filter(p=>!p.eliminated)}function rank(){return all().sort((a,b)=>b.score-a.score||a.wrong-b.wrong).slice(0,5)}function pub(t,p){if(client&&client.connected)client.publish(t,JSON.stringify(p))}function joinUrl(){let u=new URL(location.href);u.search='';u.searchParams.set('room',room);return u.toString()}
function imageCard(k,title,sub){let motifs={basketball:'<circle cx="450" cy="250" r="105" fill="#F97316"/><path d="M345 250h210M450 145v210M380 175c55 50 85 105 80 180M520 175c-55 50-85 105-80 180" stroke="#7C2D12" stroke-width="14" fill="none"/>',shoe:'<path d="M210 310c110 20 260 25 425-10 60-13 95 20 105 55H210c-45 0-75-15-85-45 30 8 55 5 85 0z" fill="#fff"/><path d="M270 290c60-65 165-80 255-50l-25 50" fill="#DBEAFE"/><ellipse cx="445" cy="300" rx="70" ry="22" fill="#60A5FA"/>',stripe:'<path d="M190 340 420 160M300 360 530 180M410 380 640 200" stroke="#fff" stroke-width="45" stroke-linecap="round"/><circle cx="685" cy="120" r="65" fill="#FACC15"/>',beetle:'<ellipse cx="450" cy="285" rx="95" ry="125" fill="#111827"/><circle cx="450" cy="165" r="60" fill="#1F2937"/><path d="M410 125c-80-90-150-20-95 55M490 125c80-90 150-20 95 55" stroke="#111827" stroke-width="24" fill="none" stroke-linecap="round"/><path d="M355 265H250M545 265h105M360 330H260M540 330h100" stroke="#111827" stroke-width="18" stroke-linecap="round"/>',roman:'<rect x="365" y="140" width="170" height="260" rx="75" fill="#E5E7EB"/><circle cx="450" cy="130" r="65" fill="#F3F4F6"/><path d="M350 415h200" stroke="#E5E7EB" stroke-width="40"/><path d="M405 120h90M415 155h70" stroke="#9CA3AF" stroke-width="10"/>',train:'<path d="M160 330c120-120 430-155 590-75 45 23 30 75-25 75H160z" fill="#E5F0FF"/><path d="M300 255h250" stroke="#001E62" stroke-width="22"/><circle cx="315" cy="355" r="28" fill="#111827"/><circle cx="625" cy="355" r="28" fill="#111827"/><text x="385" y="210" font-size="60" fill="#FACC15" font-weight="900">350</text>',copper:'<circle cx="450" cy="260" r="130" fill="#B45309"/><circle cx="450" cy="260" r="95" fill="#D97706"/><text x="393" y="285" font-size="70" fill="#FFF7ED" font-weight="900">銅</text>',spice:'<path d="M280 265c65 80 275 80 340 0 10 100-70 165-170 165S270 365 280 265z" fill="#fff"/><path d="M300 265h300" stroke="#DBEAFE" stroke-width="22"/><circle cx="355" cy="240" r="22" fill="#92400E"/><circle cx="455" cy="225" r="18" fill="#A16207"/><circle cx="535" cy="245" r="20" fill="#78350F"/><text x="375" y="170" font-size="50" fill="#FACC15" font-weight="900">Cumin</text>',coffee:'<ellipse cx="380" cy="260" rx="70" ry="105" fill="#5B2B14" transform="rotate(-20 380 260)"/><ellipse cx="515" cy="260" rx="70" ry="105" fill="#4A1F0F" transform="rotate(20 515 260)"/><path d="M380 185c-25 55-20 105 15 155M515 185c25 55 20 105-15 155" stroke="#D6A46A" stroke-width="10" fill="none"/>',merchant:'<rect x="210" y="170" width="480" height="250" rx="35" fill="#DA251D"/><polygon points="450,205 475,275 550,275 490,318 515,390 450,346 385,390 410,318 350,275 425,275" fill="#FFFF00"/><path d="M170 430h560" stroke="#fff" stroke-width="16"/>'};return `<div class="answer-img mb-5"><svg viewBox="0 0 900 520" role="img" aria-label="${esc(title)}"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#001E62"/><stop offset="1" stop-color="#0046A0"/></linearGradient><pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><path d="M0 0H42" stroke="rgba(255,255,255,.13)" stroke-width="3"/></pattern></defs><rect width="900" height="520" rx="44" fill="url(#bg)"/><rect width="900" height="520" rx="44" fill="url(#grid)"/><circle cx="745" cy="120" r="95" fill="#FACC15" opacity=".92"/>${motifs[k]||motifs.basketball}<text x="62" y="88" font-size="30" fill="#FACC15" font-weight="900">正解イメージ</text><text x="62" y="455" font-size="54" fill="white" font-weight="900">${esc(title)}</text><text x="64" y="495" font-size="28" fill="rgba(255,255,255,.85)" font-weight="700">${esc(sub)}</text></svg></div>`}
window.addEventListener('load',()=>{let p=new URLSearchParams(location.search);if(p.get('room')){role='player';room=p.get('room').toUpperCase();base=`${PREFIX}/${room}`;renderPlayerLogin()}else renderHome()});
function connect(cb){if(!window.mqtt){toast('通信ライブラリを読み込めませんでした。');return}if(client&&client.connected){cb&&cb();return}client=mqtt.connect(BROKER,{clientId:`quiz_${role}_${Math.random().toString(36).slice(2,9)}`,clean:true,reconnectPeriod:2000,connectTimeout:8000});client.on('connect',()=>{role==='host'?host.connected=true:player.connected=true;cb&&cb();updateConn()});client.on('close',()=>{role==='host'?host.connected=false:player.connected=false;updateConn()});client.on('reconnect',()=>{role==='host'?host.connected=false:player.connected=false;updateConn()});client.on('message',(t,m)=>{let d;try{d=JSON.parse(m.toString())}catch{return}role==='host'?onHost(d):onPlayer(d)})}
function updateConn(){document.querySelectorAll('[data-conn]').forEach(el=>{let ok=role==='host'?host.connected:player.connected;el.className=`inline-flex items-center gap-2 rounded-full px-4 py-2 font-black ${ok?'bg-green-400 text-[#001E62]':'bg-red-500 text-white'}`;el.innerHTML=`${ico(ok?'wifi':'off','w-4 h-4')}${ok?'接続中':'再接続中'}`})}
function renderHome(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="glass rounded-[2rem] p-8 md:p-12 text-center max-w-3xl w-full fade"><img src="${LOGO}" class="mx-auto w-60 md:w-72 bg-white rounded-2xl px-8 py-5 mb-8"><h1 class="text-4xl md:text-6xl font-black mb-4">懇親会クイズ大会</h1><p class="text-blue-100 mb-10">ホストはPC・投影画面で進行、参加者はスマートフォンから回答します。</p><div class="grid md:grid-cols-2 gap-5"><button onclick="startHost()" class="btn rounded-3xl bg-white text-[#001E62] p-8 font-black text-2xl shadow-2xl">${ico('monitor','w-12 h-12')}<br>ホスト<br><span class="text-base">進行役</span></button><button onclick="manualRoom()" class="btn rounded-3xl bg-yellow-300 text-[#001E62] p-8 font-black text-2xl shadow-2xl">${ico('phone','w-12 h-12')}<br>参加者<br><span class="text-base">Room IDを入力</span></button></div></section></main>`}
function manualRoom(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="glass rounded-[2rem] p-7 text-center w-full max-w-md fade"><img src="${LOGO}" class="mx-auto w-44 bg-white rounded-2xl px-6 py-4 mb-6"><h1 class="text-3xl font-black mb-3">Room IDを入力</h1><p class="text-blue-100 mb-6">ホスト画面に表示されている5桁のIDを入力してください。</p><input id="manualRoom" maxlength="5" class="w-full text-center text-3xl tracking-[.3em] uppercase rounded-2xl p-5 text-[#001E62] font-black outline-none mb-5" placeholder="A7K29"><button onclick="goManualRoom()" class="btn w-full rounded-2xl bg-yellow-300 text-[#001E62] py-5 font-black text-xl">入室する</button><button onclick="renderHome()" class="mt-5 underline text-blue-100">戻る</button></section></main>`}
function goManualRoom(){let v=document.getElementById('manualRoom').value.trim().toUpperCase();if(v.length!==5){alert('5桁のRoom IDを入力してください。');return}location.href=`${location.pathname}?room=${encodeURIComponent(v)}`}
function startHost(){role='host';room=makeRoom();base=`${PREFIX}/${room}`;host={phase:'lobby',players:{},qi:-1,answers:{},remain:20,result:null,connected:false,endsAt:0};connect(()=>{client.subscribe(`${base}/player`);renderHostLobby();broadcast()})}
function hostShell(c){app.innerHTML=`<main class="min-h-screen p-4 md:p-7"><header class="flex items-center justify-between gap-4 mb-5"><div class="flex items-center gap-4"><img src="${LOGO}" class="w-36 md:w-48 bg-white rounded-xl px-4 md:px-5 py-3"><div><p class="text-blue-100 font-bold tracking-widest text-sm md:text-base">懇親会クイズ大会</p><p class="text-2xl md:text-3xl font-black">Room ID：<span class="text-yellow-300">${room}</span></p></div></div><div class="text-right"><div data-conn class="inline-flex items-center gap-2 rounded-full px-4 py-2 font-black ${host.connected?'bg-green-400 text-[#001E62]':'bg-red-500 text-white'}">${ico(host.connected?'wifi':'off','w-4 h-4')}${host.connected?'接続中':'再接続中'}</div><p class="mt-2 text-blue-100 font-bold">参加者 <span>${all().length}</span>名</p></div></header>${c}</main>`}
function renderHostLobby(){host.phase='lobby';let u=joinUrl();hostShell(`<section class="grid lg:grid-cols-[420px_1fr] gap-6 fade"><div class="glass rounded-[2rem] p-7 text-center"><h1 class="text-4xl font-black mb-5">参加受付中</h1><div id="qrcode" class="qr-box bg-white rounded-[2rem] p-6 inline-flex items-center justify-center mb-5 w-[320px] h-[320px] max-w-full">${ico('qr','w-32 h-32 text-[#001E62]')}</div><p class="text-blue-100 break-all text-sm mb-4">${esc(u)}</p><div class="rounded-3xl bg-white/10 p-5 mb-6"><p class="text-blue-100 font-bold">現在の参加者数</p><p class="text-7xl font-black text-yellow-300">${all().length}</p></div><button onclick="startGame()" class="btn pulse w-full rounded-3xl bg-yellow-300 text-[#001E62] py-6 font-black text-3xl">${ico('play','w-8 h-8')} ゲーム開始</button></div><div class="glass rounded-[2rem] p-7"><h2 class="text-3xl font-black mb-5">参加者リスト</h2><div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4">${all().length?all().map(p=>`<div class="rounded-2xl bg-white/10 p-4 font-bold flex justify-between"><span>${esc(p.name)}</span><span class="text-green-300">待機中</span></div>`).join(''):'<p class="text-blue-100 text-xl">QRコードを読み取って入室してください。</p>'}</div></div></section>`);setTimeout(()=>{let el=document.getElementById('qrcode');if(el&&window.QRCode){el.innerHTML='';new QRCode(el,{text:u,width:300,height:300,colorDark:'#001E62',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H})}},0)}
function onHost(d){if(d.type==='join'){let old=host.players[d.id]||{};host.players[d.id]={id:d.id,name:String(d.name||'ゲスト').slice(0,10),score:old.score||0,wrong:old.wrong||0,eliminated:!!old.eliminated,lastCorrect:old.lastCorrect??null,lastAnswer:old.lastAnswer??null};if(host.phase==='lobby')renderHostLobby();broadcast()}if(d.type==='answer'){if(host.phase!=='question')return;let p=host.players[d.id];if(!p||p.eliminated||host.answers[d.id]!==undefined)return;host.answers[d.id]=Number(d.answer);p.lastAnswer=Number(d.answer);updateHostLive();broadcast();if(Object.keys(host.answers).length>=alive().length)finishQuestion()}}
function payload(){return{type:'state',phase:host.phase,roomId:room,questionIndex:host.qi,totalQuestions:QUESTIONS.length,question:host.phase==='question'?publicQ():null,result:host.result,players:host.players,aliveCount:alive().length,playerCount:all().length,ranking:rank()}}
function publicQ(){let q=QUESTIONS[host.qi];return{q:q.q,options:q.o,time:q.t,endsAt:host.endsAt}}
function broadcast(){pub(`${base}/host`,payload())}function startGame(){if(all().length===0){alert('参加者がまだ入室していません。');return}nextQuestion()}
function nextQuestion(){if(host.qi>=QUESTIONS.length-1){host.phase='final';clearInterval(hostTimer);cancelAnimationFrame(hostAnim);renderHostFinal();broadcast();return}host.qi++;host.phase='question';host.answers={};host.result=null;let q=QUESTIONS[host.qi];host.remain=q.t;host.endsAt=Date.now()+q.t*1000;all().forEach(p=>{p.lastCorrect=null;p.lastAnswer=null});renderHostQuestion();broadcast();startHostTimer()}
function startHostTimer(){clearInterval(hostTimer);cancelAnimationFrame(hostAnim);hostTimer=setInterval(()=>{host.remain=Math.max(0,Math.ceil((host.endsAt-Date.now())/1000));updateHostLive();if(host.remain<=0)finishQuestion()},200);smoothBar('hTimeBar','timeBox',()=>host.endsAt,()=>QUESTIONS[host.qi]?.t||20,true)}
function smoothBar(id,boxId,ends,totalFn,isHost){function tick(){let total=totalFn()*1000,left=Math.max(0,(ends()-Date.now())/total),bar=document.getElementById(id),box=document.getElementById(boxId);if(bar){bar.style.transform=`scaleX(${left})`;bar.className=`bar ${left<=.25?'!bg-red-500':''}`}if(box){box.className=box.className.replace(/bg-white text-\[#001E62\]|bg-red-500 text-white/g,left<=.25?'bg-red-500 text-white':'bg-white text-[#001E62]')}if(left>0){if(isHost)hostAnim=requestAnimationFrame(tick);else playerAnim=requestAnimationFrame(tick)}}tick()}
function renderHostQuestion(){let q=QUESTIONS[host.qi];hostShell(`<section class="glass rounded-[2rem] p-6 md:p-8 fade"><div class="grid lg:grid-cols-[1fr_260px] gap-6 items-start mb-6"><div><p class="text-yellow-300 font-black text-2xl">第 ${host.qi+1} 問 / ${QUESTIONS.length}</p><div class="w-80 max-w-full h-3 bg-white/20 rounded-full mt-3 overflow-hidden"><div class="h-full bg-yellow-300 rounded-full" style="width:${(host.qi+1)/QUESTIONS.length*100}%"></div></div></div><div id="timeBox" class="soft text-center rounded-[2rem] bg-white text-[#001E62] px-8 py-5"><p class="font-bold">残り時間</p><p id="hTime" class="text-6xl font-black">${host.remain}</p></div></div><div class="bar-wrap h-4 bg-white/20 rounded-full mb-7"><div id="hTimeBar" class="bar"></div></div><div class="grid xl:grid-cols-[1fr_340px] gap-6"><div><h1 class="text-3xl md:text-5xl font-black leading-tight mb-8">${esc(q.q)}</h1><div class="grid md:grid-cols-2 gap-4">${q.o.map((op,i)=>`<div class="rounded-3xl bg-white text-[#001E62] p-5 md:p-6 text-2xl font-black flex items-center gap-4"><span class="rounded-full bg-[#001E62] text-white w-12 h-12 flex items-center justify-center shrink-0">${String.fromCharCode(65+i)}</span><span>${esc(op)}</span></div>`).join('')}</div></div><aside class="space-y-4"><div id="answerBox" class="soft rounded-3xl bg-white/10 p-6"><p class="text-blue-100 font-bold">回答状況</p><p class="text-5xl font-black text-yellow-300"><span id="hAnswered">0</span> / <span id="hAlive">${alive().length}</span></p><p class="mt-2 text-sm text-blue-100">未回答は不正解扱いです</p></div><div class="rounded-3xl bg-white/10 p-5"><p class="text-blue-100 font-bold mb-3">進行メモ</p><p class="text-lg font-bold">参加者のスマートフォンに同じ問題が表示されています。</p></div></aside></div></section>`);updateHostLive()}
function updateHostLive(){let t=host.remain,answered=Object.keys(host.answers).length,live=alive().length,ht=document.getElementById('hTime'),box=document.getElementById('timeBox'),ans=document.getElementById('hAnswered'),al=document.getElementById('hAlive'),abox=document.getElementById('answerBox');if(ht&&ht.textContent!=String(t)){ht.textContent=t;box&&box.classList.add('pop');setTimeout(()=>box&&box.classList.remove('pop'),180)}if(ans&&ans.textContent!=String(answered)){ans.textContent=answered;abox&&abox.classList.add('pop');setTimeout(()=>abox&&abox.classList.remove('pop'),180)}if(al)al.textContent=live}
function finishQuestion(){if(host.phase!=='question')return;clearInterval(hostTimer);cancelAnimationFrame(hostAnim);let q=QUESTIONS[host.qi],counts=[0,0,0,0];Object.values(host.answers).forEach(a=>{if(a>=0&&a<=3)counts[a]++});all().forEach(p=>{if(p.eliminated)return;let ans=host.answers[p.id],ok=ans===q.c;p.lastAnswer=ans??null;p.lastCorrect=ok;if(ok)p.score+=100;else{p.wrong++;if(p.wrong>=MAX_WRONG)p.eliminated=true}});host.phase='result';host.result={questionText:q.q,options:q.o,correct:q.c,correctText:q.o[q.c],counts,explain:q.e,visualTitle:q.v,visualSub:q.s,kind:q.k};renderHostResult();broadcast()}
function renderHostResult(){let r=host.result;hostShell(`<section class="grid xl:grid-cols-[1.05fr_.95fr] gap-6 fade"><div class="glass rounded-[2rem] p-6 md:p-8"><p class="text-yellow-300 font-black text-2xl mb-2">正解発表</p><h1 class="text-2xl md:text-4xl font-black mb-5">${esc(r.questionText)}</h1><div class="bg-white rounded-[2rem] p-5"><canvas id="chart" height="190"></canvas></div><div class="grid grid-cols-2 gap-4 mt-5"><div class="rounded-2xl bg-white/10 p-5"><p class="text-blue-100 font-bold">生存者</p><p class="text-5xl font-black">${alive().length}</p></div><div class="rounded-2xl bg-white/10 p-5"><p class="text-blue-100 font-bold">脱落者</p><p class="text-5xl font-black">${all().filter(p=>p.eliminated).length}</p></div></div></div><div class="glass rounded-[2rem] p-6 md:p-8 flex flex-col"><p class="text-blue-100 font-bold text-xl mb-3">正解</p><div class="rounded-[2rem] bg-yellow-300 text-[#001E62] p-6 mb-5"><p class="text-5xl font-black">${String.fromCharCode(65+r.correct)}</p><p class="text-3xl font-black mt-2">${esc(r.correctText)}</p></div>${imageCard(r.kind,r.visualTitle,r.visualSub)}<div class="rounded-3xl bg-white/10 p-5 mb-5"><p class="text-yellow-300 font-black mb-2">ミニ解説</p><p class="text-lg leading-relaxed font-bold">${esc(r.explain)}</p></div><button onclick="nextQuestion()" class="btn mt-auto w-full rounded-3xl bg-white text-[#001E62] py-5 font-black text-2xl">${host.qi>=QUESTIONS.length-1?'ランキングへ':'次の問題へ'}</button></div></section>`);setTimeout(drawChart,0)}
function drawChart(){if(!window.Chart||!host.result)return;let c=document.getElementById('chart');if(!c)return;if(chart)chart.destroy();let r=host.result;chart=new Chart(c,{type:'bar',data:{labels:r.options.map((o,i)=>`${String.fromCharCode(65+i)}. ${o}`),datasets:[{label:'回答数',data:r.counts,backgroundColor:r.options.map((_,i)=>i===r.correct?'#FACC15':'#001E62'),borderRadius:12}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}})}
function renderHostFinal(){hostShell(`<section class="glass rounded-[2rem] p-8 md:p-12 text-center fade"><div class="text-yellow-300 mb-4">${ico('trophy','w-24 h-24')}</div><p class="text-yellow-300 font-black tracking-widest text-2xl mb-3">FINAL RESULT</p><h1 class="text-6xl md:text-8xl font-black mb-10">ランキング</h1><div class="max-w-4xl mx-auto space-y-4 mb-10">${rank().map((p,i)=>`<div class="rounded-[2rem] ${i===0?'rank1':'rankN'} p-5 md:p-6 flex items-center justify-between shadow-2xl"><div class="flex items-center gap-5"><div class="w-14 md:w-16 h-14 md:h-16 rounded-full bg-[#001E62] text-white flex items-center justify-center text-2xl md:text-3xl font-black">${i+1}</div><div class="text-left"><p class="text-2xl md:text-3xl font-black">${esc(p.name)}</p><p class="font-bold opacity-80">失誤 ${p.wrong} / ${MAX_WRONG} ${p.eliminated?'・脱落':'・生存'}</p></div></div><p class="text-4xl md:text-5xl font-black">${p.score}</p></div>`).join('')}</div><button onclick="location.href=location.pathname" class="btn rounded-3xl bg-white text-[#001E62] px-12 py-5 font-black text-2xl">最初に戻る</button></section>`)}
function renderPlayerLogin(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5 safe"><section class="glass rounded-[2rem] p-7 text-center w-full max-w-md fade"><img src="${LOGO}" class="mx-auto w-44 bg-white rounded-2xl px-6 py-4 mb-6"><p class="text-yellow-300 font-black text-xl mb-1">Room ID：${esc(room)}</p><h1 class="text-3xl font-black mb-3">ニックネームを入力</h1><p class="text-blue-100 mb-6">10文字以内で入力してください。</p><input id="nickname" maxlength="10" value="${esc(player.name)}" class="w-full rounded-2xl p-5 text-[#001E62] font-black text-2xl text-center outline-none mb-5" placeholder="お名前"><button onclick="joinPlayer()" class="btn w-full rounded-2xl bg-yellow-300 text-[#001E62] py-5 font-black text-xl">入室する</button><p id="msg" class="mt-5 text-blue-100 text-sm"></p></section></main>`}
function joinPlayer(){let name=document.getElementById('nickname').value.trim().slice(0,10);if(!name){document.getElementById('msg').textContent='ニックネームを入力してください。';return}player.name=name;player.joined=true;savePlayer();connect(()=>{client.subscribe(`${base}/host`);pub(`${base}/player`,{type:'join',id:player.id,name:player.name});renderPlayerWaiting('入室しました。開始までお待ちください。')})}
function onPlayer(d){if(d.type!=='state')return;let me=d.players&&d.players[player.id];if(me){player.score=me.score;player.wrong=me.wrong;player.eliminated=me.eliminated;savePlayer()}if(player.eliminated&&d.phase!=='final'){clearInterval(playerTimer);cancelAnimationFrame(playerAnim);renderPlayerEliminated();return}if(d.phase==='lobby')renderPlayerWaiting('入室しました。開始までお待ちください。');if(d.phase==='question'){if(player.lastQi!==d.questionIndex){player.selected=null;player.locked=false;player.lastQi=d.questionIndex}renderPlayerQuestion(d);startPlayerTimer(d.question.endsAt,d.question.time)}if(d.phase==='result'){clearInterval(playerTimer);cancelAnimationFrame(playerAnim);renderPlayerResult(d,me)}if(d.phase==='final'){clearInterval(playerTimer);cancelAnimationFrame(playerAnim);renderPlayerFinal(d)}}
function playerShell(c,danger=false){app.innerHTML=`<main class="min-h-screen p-4 safe ${danger?'!bg-red-900':''}"><header class="flex items-center justify-between mb-4"><img src="${LOGO}" class="w-32 bg-white rounded-xl px-4 py-3"><div class="text-right"><div data-conn class="inline-flex items-center gap-1 rounded-full px-3 py-1 text-xs font-black ${player.connected?'bg-green-400 text-[#001E62]':'bg-red-500 text-white'}">${ico(player.connected?'wifi':'off','w-3 h-3')}${player.connected?'接続中':'再接続中'}</div><p class="text-yellow-300 font-black mt-1">${esc(room)}</p></div></header>${c}</main>`}
function renderPlayerWaiting(msg){playerShell(`<section class="glass rounded-[2rem] p-7 text-center fade min-h-[72vh] flex flex-col justify-center"><div class="text-yellow-300 mx-auto mb-6">${ico('phone','w-20 h-20')}</div><h1 class="text-3xl font-black mb-4">待機中</h1><p class="text-blue-100 text-lg">${esc(msg)}</p><div class="mt-8 rounded-2xl bg-white/10 p-5"><p class="text-blue-100 font-bold">あなたの名前</p><p class="text-3xl font-black">${esc(player.name)}</p></div></section>`)}
function renderPlayerQuestion(d){let q=d.question;playerShell(`<section class="fade"><div class="glass rounded-[2rem] p-5 mb-4"><div class="flex justify-between gap-3 items-center mb-3"><p class="text-yellow-300 font-black">第 ${d.questionIndex+1} 問 / ${d.totalQuestions}</p><div id="pTimeBox" class="soft rounded-2xl bg-white text-[#001E62] px-4 py-2 text-center"><p class="text-xs font-bold">残り</p><p id="pTime" class="text-3xl font-black">${q.time}</p></div></div><div class="bar-wrap h-3 bg-white/20 rounded-full mb-4"><div id="pTimeBar" class="bar"></div></div><h1 class="text-xl font-black leading-snug">${esc(q.q)}</h1></div><div class="space-y-3">${q.options.map((op,i)=>`<button ${player.locked?'disabled':''} onclick="sendAnswer(${i})" class="opt btn w-full rounded-3xl p-5 text-left font-black text-lg shadow-2xl ${player.selected===i?'bg-yellow-300 text-[#001E62]':'bg-white text-[#001E62]'} ${player.locked&&player.selected!==i?'opacity-45':''}"><div class="flex items-center gap-4"><span class="shrink-0 w-11 h-11 rounded-full bg-[#001E62] text-white flex items-center justify-center">${String.fromCharCode(65+i)}</span><span>${esc(op)}</span></div></button>`).join('')}</div><div class="mt-4 glass rounded-2xl p-4 text-center"><p id="sendMsg" class="${player.locked?'text-yellow-300':'text-blue-100'} font-black">${player.locked?'送信しました。大画面をご覧ください。':'答えを1つ選んでください。'}</p><p class="mt-2 text-sm text-blue-100">現在の失誤：${player.wrong} / ${MAX_WRONG}</p></div></section>`)}
function startPlayerTimer(endsAt,total){clearInterval(playerTimer);cancelAnimationFrame(playerAnim);playerTimer=setInterval(()=>{let left=Math.max(0,Math.ceil((endsAt-Date.now())/1000)),t=document.getElementById('pTime');if(t)t.textContent=left;if(left<=0)clearInterval(playerTimer)},200);smoothBar('pTimeBar','pTimeBox',()=>endsAt,()=>total,false)}
function sendAnswer(i){if(player.locked||player.eliminated)return;player.selected=i;player.locked=true;pub(`${base}/player`,{type:'answer',id:player.id,answer:i});document.querySelectorAll('button[onclick^="sendAnswer"]').forEach((b,idx)=>{b.disabled=true;if(idx===i)b.className=b.className.replace('bg-white text-[#001E62]','bg-yellow-300 text-[#001E62]');else b.classList.add('opacity-45')});let m=document.getElementById('sendMsg');if(m){m.textContent='送信しました。大画面をご覧ください。';m.className='text-yellow-300 font-black'}toast('送信しました。')}
function renderPlayerResult(d,me){let r=d.result,ok=me&&me.lastCorrect===true;if(!ok&&navigator.vibrate)navigator.vibrate([160,70,160]);playerShell(`<section class="glass rounded-[2rem] p-5 text-center fade"><div class="${ok?'text-green-300':'text-red-300'} mx-auto mb-4">${ico(ok?'check':'x','w-20 h-20')}</div><h1 class="text-4xl font-black ${ok?'text-green-300':'text-red-300'} mb-4">${ok?'正解です！':'残念、不正解です'}</h1><div class="rounded-3xl bg-white text-[#001E62] p-5 mb-4"><p class="font-bold mb-1">正解</p><p class="text-2xl font-black">${String.fromCharCode(65+r.correct)}. ${esc(r.correctText)}</p></div>${imageCard(r.kind,r.visualTitle,r.visualSub)}<div class="rounded-3xl bg-white/10 p-4 mb-4 text-left"><p class="text-yellow-300 font-black mb-2">ミニ解説</p><p class="font-bold leading-relaxed">${esc(r.explain)}</p></div><div class="rounded-3xl bg-white/10 p-4"><p class="text-blue-100 font-bold">あなたの失誤</p><p class="text-5xl font-black ${player.wrong>=4?'text-red-300':'text-yellow-300'}">${player.wrong} / ${MAX_WRONG}</p></div><p class="mt-4 text-blue-100">次の問題までお待ちください。</p></section>`)}
function renderPlayerEliminated(){playerShell(`<section class="rounded-[2rem] bg-red-700/90 border border-red-300 p-8 text-center fade min-h-[78vh] flex flex-col items-center justify-center"><div class="mb-6">${ico('skull','w-32 h-32')}</div><h1 class="text-6xl font-black mb-4">脱落</h1><p class="text-xl font-bold mb-6">失誤が${MAX_WRONG}回に達しました。</p><div class="rounded-3xl bg-white text-red-700 p-6 w-full"><p class="font-bold">最終スコア</p><p class="text-5xl font-black">${player.score}</p></div><p class="mt-6 text-red-100">以降の問題には回答できません。大画面をご覧ください。</p></section>`,true)}
function renderPlayerFinal(d){let rk=d.ranking||[];playerShell(`<section class="glass rounded-[2rem] p-6 text-center fade"><div class="text-yellow-300 mx-auto mb-5">${ico('trophy','w-24 h-24')}</div><h1 class="text-4xl font-black mb-6">お疲れさまでした！</h1><div class="rounded-3xl bg-white text-[#001E62] p-6 mb-6"><p class="font-bold">あなたのスコア</p><p class="text-6xl font-black">${player.score}</p><p class="font-bold mt-2">失誤 ${player.wrong} / ${MAX_WRONG}</p></div><h2 class="text-2xl font-black mb-4">TOP 5</h2><div class="space-y-3">${rk.map((p,i)=>`<div class="rounded-2xl bg-white/10 p-4 flex justify-between items-center"><div class="text-left"><p class="font-black">${i+1}. ${esc(p.name)}</p><p class="text-xs text-blue-100">${p.eliminated?'脱落':'生存'}・失誤 ${p.wrong}/${MAX_WRONG}</p></div><p class="text-2xl font-black text-yellow-300">${p.score}</p></div>`).join('')}</div></section>`)}
</script></body></html>
