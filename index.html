<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />

<style>
:root{--blue:#001E62;--gold:#FACC15;--bg:#F7FAFF;--ink:#07132f;--red:#EF4444}
*{box-sizing:border-box;font-family:'Noto Sans JP',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;color:var(--ink);background:radial-gradient(circle at 88% 8%,rgba(0,30,98,.08),transparent 24%),linear-gradient(135deg,#fff,#eef4ff 58%,#fbfdff);overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(45deg,rgba(0,30,98,.035) 0,rgba(0,30,98,.035) 2px,transparent 2px,transparent 24px)}
.panel{background:rgba(255,255,255,.92);border:1px solid rgba(0,30,98,.10);box-shadow:0 18px 50px rgba(0,30,98,.10);backdrop-filter:blur(10px)}
.blue{background:var(--blue);color:#fff}.gold{background:var(--gold);color:var(--blue)}.muted{background:#F2F6FF;color:var(--blue)}
.btn{transition:transform .12s,opacity .12s}.btn:active{transform:scale(.975)}.btn:disabled{opacity:.55}.fade{animation:fade .2s ease both}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pulse{animation:pulse 1.7s infinite}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(250,204,21,.55)}70%{box-shadow:0 0 0 22px rgba(250,204,21,0)}100%{box-shadow:0 0 0 0 rgba(250,204,21,0)}}
.barwrap{overflow:hidden;transform:translateZ(0)}.bar{height:100%;width:100%;transform-origin:left center;will-change:transform;background:linear-gradient(90deg,#001E62,#3B82F6)}
.opt{min-height:86px}.qr-box canvas,.qr-box img{margin:auto;border-radius:18px}.safe{padding-bottom:env(safe-area-inset-bottom)}
.logo{display:block;width:150px;max-width:34vw}.logo-sm{display:block;width:112px}.visual svg{display:block;width:100%;height:auto;border-radius:24px}.shake{animation:shake .45s ease}@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
.host-main{height:100vh;overflow:hidden}.host-content{height:calc(100vh - 96px);overflow:hidden}.rank1{background:#FACC15;color:#001E62}.rankN{background:#fff;color:#001E62}
@media(max-width:900px){.host-main{height:auto;overflow:auto}.host-content{height:auto;overflow:visible}.logo{width:132px}}
</style></head>
<body><div id="app"></div><div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-[#001E62] text-white font-black rounded-full px-6 py-3 shadow-2xl"></div>
<script>
'use strict';
const BROKER='wss://broker.emqx.io:8084/mqtt',PREFIX='partyquiz/formal-quiz-v8',LOGO='https://upload.wikimedia.org/wikipedia/commons/b/b1/Asics_Logo.svg',MAX_WRONG=7;
const Q=[
{q:'ベトナム国旗の「黄色い星」の5つの角が表す階級に含まれないのは？',o:['農民','労働者','軍人','商人'],c:3,t:20,k:'merchant',v:'商人',s:'黄色い星に含まれない階級',e:'黄色い星の5つの角は、一般的に「労働者、農民、知識人、青年、軍人」を表すとされています。商人は含まれません。'},
{q:'ベトナムで主に栽培されているコーヒー豆の品種は？',o:['アラビカ種','ロブスタ種','リベリカ種','エクセルサ種'],c:1,t:20,k:'coffee',v:'ロブスタ種',s:'ベトナムコーヒー',e:'ベトナムではロブスタ種のコーヒー豆が主に栽培されています。力強い苦味が特徴で、ベトナムコーヒーの個性にもつながっています。'},
{q:'ベトナムの通貨「ドン（Đồng）」の本来の意味は？',o:['銅','銀','金','龍'],c:0,t:20,k:'copper',v:'銅',s:'Đồngの本来の意味',e:'ベトナムの通貨「ドン（Đồng）」は、本来「銅」を意味する言葉です。通貨名に金属名が使われている点が特徴です。'},
{q:'1950年、オニツカ株式会社（現ASICS）が最初に発売した競技用シューズの種目は？',o:['マラソン','バスケットボール','レスリング','体操'],c:1,t:20,k:'basket',v:'バスケットボール',s:'最初の競技用シューズ',e:'1950年、オニツカ株式会社が最初に発売した競技用シューズはバスケットボールシューズです。シューズづくりの歴史は、ここから始まりました。'},
{q:'1986年、初めて「GEL」を搭載したシューズのモデル名は？',o:['GT-II','TARTHER','GEL-LYTE','KAYANO'],c:0,t:20,k:'shoe',v:'GT-II',s:'初のGEL搭載モデル',e:'1986年に発売されたGT-IIは、初めてGELを搭載したモデルとして知られています。衝撃緩衝性を高める代表的な技術へと発展しました。'},
{q:'1966年に誕生した、アシックスストライプの当時の呼び名は？',o:['タイガーライン','オリンピックライン','メキシコライン','スピードライン'],c:2,t:20,k:'stripe',v:'メキシコライン',s:'1966年に誕生',e:'1966年に誕生したアシックスストライプは、当時「メキシコライン」と呼ばれていました。現在もブランドを象徴するデザインとして受け継がれています。'},
{q:'初代「GEL-KAYANO」のデザインモチーフとなった昆虫は？',o:['クワガタ','カブトムシ','トンボ','カマキリ'],c:0,t:20,k:'beetle',v:'クワガタ',s:'GEL-KAYANOのモチーフ',e:'初代GEL-KAYANOのデザインモチーフはクワガタです。力強さや安定感を表現するイメージとして、デザインに取り入れられました。'},
{q:'社名の由来「Anima Sana In Corpore Sano」を残した古代ローマの詩人は？',o:['ユウェナリス','ホラティウス','ウェルギリウス','オウィディウス'],c:0,t:20,k:'roman',v:'ユウェナリス',s:'古代ローマの詩人',e:'社名は「Anima Sana In Corpore Sano」に由来します。この言葉に関係する古代ローマの詩人がユウェナリスです。'},
{q:'計画中のベトナム「南北高速鉄道」の最高設計速度は？',o:['250 km/h','300 km/h','350 km/h','400 km/h'],c:2,t:20,k:'train',v:'350 km/h',s:'南北高速鉄道',e:'ベトナムで計画されている南北高速鉄道では、最高設計速度として350 km/hが示されています。ハノイとホーチミン市を結ぶ大型プロジェクトです。'},
{q:'ベトナム料理「フォー」のスープに通常「使われない」のは？',o:['八角','シナモン','クミン','クローブ'],c:2,t:20,k:'spice',v:'クミン',s:'フォーには通常使われない香辛料',e:'フォーのスープには、八角、シナモン、クローブなどの香辛料がよく使われます。一方、クミンは通常のフォーのスープでは一般的ではありません。'}];
let app=document.getElementById('app'),role,room,base,client,chart,hostTimer,hostRAF,playerTimer,playerRAF;
let host={phase:'home',players:{},qi:-1,answers:{},remain:20,result:null,connected:false,endsAt:0}; let player=loadP();
function loadP(){let s={};try{s=JSON.parse(localStorage.getItem('quizPlayerV8')||'{}')}catch{};return{id:s.id||(crypto.randomUUID?crypto.randomUUID():'p_'+Math.random().toString(36).slice(2)),name:s.name||'',score:s.score||0,wrong:s.wrong||0,eliminated:!!s.eliminated,selected:null,locked:false,lastQi:-1,connected:false}}
function saveP(){localStorage.setItem('quizPlayerV8',JSON.stringify({id:player.id,name:player.name,score:player.score,wrong:player.wrong,eliminated:player.eliminated}))}
function esc(x){return String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function icon(n,c='w-6 h-6'){let m={monitor:'<path d="M3 5h18v11H3z"/><path d="M8 21h8"/><path d="M12 16v5"/>',phone:'<rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/>',play:'<polygon points="6 3 20 12 6 21 6 3"/>',wifi:'<path d="M5 13a10 10 0 0 1 14 0"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M12 20h.01"/>',off:'<path d="m2 2 20 20"/><path d="M5 13a10 10 0 0 1 5.2-2.7"/><path d="M19 13a10 10 0 0 0-5.2-2.7"/>',skull:'<path d="M12 2a8 8 0 0 0-8 8c0 3 2 5 4 6v4h8v-4c2-1 4-3 4-6a8 8 0 0 0-8-8z"/><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/><path d="M10 15h4"/>',check:'<path d="M20 6 9 17l-5-5"/>',x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',trophy:'<path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v7a5 5 0 0 1-10 0V4z"/><path d="M5 5H3v3a4 4 0 0 0 4 4"/><path d="M19 5h2v3a4 4 0 0 1-4 4"/>',qr:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h2v2h-2zM18 14h3v3M14 18h3v3M19 19h2v2"/>'};return `<svg class="${c} inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">${m[n]||''}</svg>`}
function toast(s){let t=document.getElementById('toast');t.textContent=s;t.classList.remove('hidden');clearTimeout(toast.id);toast.id=setTimeout(()=>t.classList.add('hidden'),1500)}
function makeRoom(){let c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:5},()=>c[Math.floor(Math.random()*c.length)]).join('')}function all(){return Object.values(host.players)}function alive(){return all().filter(p=>!p.eliminated)}function ranks(){return all().sort((a,b)=>b.score-a.score||a.wrong-b.wrong).slice(0,5)}function pub(t,p){if(client&&client.connected)client.publish(t,JSON.stringify(p))}function joinURL(){let u=new URL(location.href);u.search='';u.searchParams.set('room',room);return u.toString()}
function visual(k,title,sub){let motif={merchant:'<rect x="210" y="170" width="480" height="250" rx="35" fill="#DA251D"/><polygon points="450,205 475,275 550,275 490,318 515,390 450,346 385,390 410,318 350,275 425,275" fill="#FFFF00"/>',coffee:'<ellipse cx="380" cy="265" rx="72" ry="108" fill="#5B2B14" transform="rotate(-20 380 265)"/><ellipse cx="518" cy="265" rx="72" ry="108" fill="#4A1F0F" transform="rotate(20 518 265)"/><path d="M380 188c-25 55-20 108 15 158M518 188c25 55 20 108-15 158" stroke="#D6A46A" stroke-width="10" fill="none"/>',copper:'<circle cx="450" cy="262" r="132" fill="#B45309"/><circle cx="450" cy="262" r="96" fill="#D97706"/><text x="393" y="288" font-size="72" fill="#FFF7ED" font-weight="900">銅</text>',basket:'<rect x="250" y="115" width="400" height="280" rx="24" fill="#F8FAFC"/><path d="M250 235h400M450 115v280" stroke="#CBD5E1" stroke-width="8"/><rect x="510" y="145" width="100" height="68" rx="6" fill="none" stroke="#001E62" stroke-width="14"/><circle cx="560" cy="260" r="82" fill="#F97316"/><path d="M478 260h164M560 178v164M505 205c45 45 65 90 62 137M615 205c-45 45-65 90-62 137" stroke="#7C2D12" stroke-width="10" fill="none"/>',shoe:'<path d="M190 325c140 25 315 25 485-18 62-16 104 20 116 63H190c-55 0-92-18-105-55 36 10 70 10 105 10z" fill="#fff"/><path d="M255 305c78-78 205-96 315-55l-38 60" fill="#E8F1FF"/>',stripe:'<path d="M170 350 430 150M300 370 560 170M430 390 690 190" stroke="#fff" stroke-width="48" stroke-linecap="round"/>',beetle:'<ellipse cx="450" cy="286" rx="96" ry="128" fill="#111827"/><circle cx="450" cy="165" r="60" fill="#1F2937"/><path d="M410 125c-82-92-155-20-98 58M490 125c82-92 155-20 98 58" stroke="#111827" stroke-width="24" fill="none" stroke-linecap="round"/>',roman:'<rect x="365" y="138" width="170" height="265" rx="78" fill="#E5E7EB"/><circle cx="450" cy="130" r="66" fill="#F3F4F6"/>',train:'<path d="M150 330c125-122 440-158 600-78 50 25 32 78-28 78H150z" fill="#E8F1FF"/><text x="382" y="212" font-size="62" fill="#FACC15" font-weight="900">350</text>',spice:'<path d="M280 268c66 80 276 80 340 0 10 102-70 165-170 165S270 370 280 268z" fill="#fff"/><circle cx="355" cy="240" r="22" fill="#92400E"/><circle cx="455" cy="225" r="18" fill="#A16207"/><circle cx="535" cy="245" r="20" fill="#78350F"/><text x="372" y="170" font-size="52" fill="#FACC15" font-weight="900">Cumin</text>'};return `<div class="visual"><svg viewBox="0 0 900 520"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07132f"/><stop offset=".55" stop-color="#001E62"/><stop offset="1" stop-color="#004AA5"/></linearGradient><pattern id="p" width="44" height="44" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><path d="M0 0H44" stroke="rgba(255,255,255,.11)" stroke-width="3"/></pattern></defs><rect width="900" height="520" rx="46" fill="url(#g)"/><rect width="900" height="520" rx="46" fill="url(#p)"/><circle cx="740" cy="118" r="94" fill="#FACC15" opacity=".92"/>${motif[k]||motif.basket}<text x="62" y="86" font-size="28" fill="#FACC15" font-weight="900" letter-spacing="3">ANSWER VISUAL</text><text x="62" y="452" font-size="56" fill="#fff" font-weight="900">${esc(title)}</text><text x="64" y="493" font-size="28" fill="rgba(255,255,255,.86)" font-weight="700">${esc(sub)}</text></svg></div>`}
window.addEventListener('load',()=>{let p=new URLSearchParams(location.search);if(p.get('room')){role='player';room=p.get('room').toUpperCase();base=`${PREFIX}/${room}`;renderPlayerLogin()}else renderHome()});
function connect(cb){if(!window.mqtt){toast('通信ライブラリを読み込めませんでした。');return}if(client&&client.connected){cb&&cb();return}client=mqtt.connect(BROKER,{clientId:`quiz_${role}_${Math.random().toString(36).slice(2,9)}`,clean:true,reconnectPeriod:2000,connectTimeout:8000});client.on('connect',()=>{role==='host'?host.connected=true:player.connected=true;cb&&cb();updateConn()});client.on('close',()=>{role==='host'?host.connected=false:player.connected=false;updateConn()});client.on('reconnect',()=>{role==='host'?host.connected=false:player.connected=false;updateConn()});client.on('message',(t,m)=>{let d;try{d=JSON.parse(m.toString())}catch{return}role==='host'?onHost(d):onPlayer(d)})}
function updateConn(){document.querySelectorAll('[data-conn]').forEach(el=>{let ok=role==='host'?host.connected:player.connected;el.className=`inline-flex items-center gap-2 rounded-full px-4 py-2 font-black ${ok?'bg-green-400 text-[#001E62]':'bg-red-500 text-white'}`;el.innerHTML=`${icon(ok?'wifi':'off','w-4 h-4')}${ok?'接続中':'再接続中'}`})}
function renderHome(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="glass rounded-[2rem] p-8 md:p-12 text-center max-w-3xl w-full fade"><img src="${LOGO}" class="logo mx-auto mb-8"><h1 class="text-4xl md:text-6xl font-black mb-4 text-[#001E62]">懇親会クイズ大会</h1><p class="text-slate-600 mb-10 font-bold">ホストはPC・投影画面で進行、参加者はスマートフォンから回答します。</p><div class="grid md:grid-cols-2 gap-5"><button onclick="startHost()" class="btn rounded-3xl blue p-8 font-black text-2xl shadow-2xl">${icon('monitor','w-12 h-12')}<br>ホスト<br><span class="text-base">進行役</span></button><button onclick="manualRoom()" class="btn rounded-3xl gold p-8 font-black text-2xl shadow-2xl">${icon('phone','w-12 h-12')}<br>参加者<br><span class="text-base">Room IDを入力</span></button></div></section></main>`}
function manualRoom(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="glass rounded-[2rem] p-7 text-center w-full max-w-md fade"><img src="${LOGO}" class="logo-sm mx-auto mb-6"><h1 class="text-3xl font-black mb-3 text-[#001E62]">Room IDを入力</h1><input id="manualRoom" maxlength="5" class="w-full text-center text-3xl tracking-[.3em] uppercase rounded-2xl p-5 text-[#001E62] font-black outline-none mb-5 border" placeholder="A7K29"><button onclick="goManualRoom()" class="btn w-full rounded-2xl gold py-5 font-black text-xl">入室する</button><button onclick="renderHome()" class="mt-5 underline text-[#001E62] font-bold">戻る</button></section></main>`}
function goManualRoom(){let v=document.getElementById('manualRoom').value.trim().toUpperCase();if(v.length!==5){alert('5桁のRoom IDを入力してください。');return}location.href=`${location.pathname}?room=${encodeURIComponent(v)}`}
function startHost(){role='host';room=makeRoom();base=`${PREFIX}/${room}`;host={phase:'lobby',players:{},qi:-1,answers:{},remain:20,result:null,connected:false,endsAt:0};connect(()=>{client.subscribe(`${base}/player`);renderHostLobby();broadcast()})}
function hostShell(c){app.innerHTML=`<main class="host-main p-4 md:p-6"><header class="h-[76px] flex items-center justify-between gap-4 mb-4"><img src="${LOGO}" class="logo"><div class="text-right"><div data-conn class="inline-flex items-center gap-2 rounded-full px-4 py-2 font-black ${host.connected?'bg-green-400 text-[#001E62]':'bg-red-500 text-white'}">${icon(host.connected?'wifi':'off','w-4 h-4')}${host.connected?'接続中':'再接続中'}</div><p class="mt-1 text-slate-600 font-bold">参加者 ${all().length}名</p></div></header><div class="host-content">${c}</div></main>`}
function renderHostLobby(){host.phase='lobby';let u=joinURL();hostShell(`<section class="grid lg:grid-cols-[380px_1fr] gap-5 fade h-full"><div class="panel rounded-[2rem] p-6 text-center"><h1 class="text-3xl font-black mb-4 text-[#001E62]">参加受付中</h1><div id="qrcode" class="qr-box bg-white rounded-[2rem] p-4 inline-flex items-center justify-center mb-4 w-[280px] h-[280px] max-w-full border">${icon('qr','w-28 h-28 text-[#001E62]')}</div><div class="rounded-3xl bg-[#F4F7FF] p-4 mb-5"><p class="text-slate-600 font-bold">現在の参加者数</p><p class="text-6xl font-black text-[#001E62]">${all().length}</p></div><button onclick="startGame()" class="btn pulse w-full rounded-3xl gold py-5 font-black text-2xl">${icon('play','w-7 h-7')} ゲーム開始</button></div><div class="panel rounded-[2rem] p-6 overflow-hidden"><h2 class="text-3xl font-black mb-5 text-[#001E62]">参加者リスト</h2><div class="grid md:grid-cols-2 xl:grid-cols-3 gap-3">${all().length?all().map(p=>`<div class="rounded-2xl bg-[#F4F7FF] p-4 font-bold flex justify-between text-[#001E62]"><span>${esc(p.name)}</span><span class="text-green-600">待機中</span></div>`).join(''):'<p class="text-slate-600 text-xl font-bold">QRコードを読み取って入室してください。</p>'}</div></div></section>`);setTimeout(()=>{let el=document.getElementById('qrcode');if(el&&window.QRCode){el.innerHTML='';new QRCode(el,{text:u,width:260,height:260,colorDark:'#001E62',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H})}},0)}
function onHost(d){if(d.type==='join'){let old=host.players[d.id]||{};host.players[d.id]={id:d.id,name:String(d.name||'ゲスト').slice(0,10),score:old.score||0,wrong:old.wrong||0,eliminated:!!old.eliminated,lastCorrect:old.lastCorrect??null,lastAnswer:old.lastAnswer??null};if(host.phase==='lobby')renderHostLobby();broadcast()}if(d.type==='answer'){if(host.phase!=='question')return;let p=host.players[d.id];if(!p||p.eliminated||host.answers[d.id]!==undefined)return;host.answers[d.id]=Number(d.answer);p.lastAnswer=Number(d.answer);updateHostLive();broadcast();if(Object.keys(host.answers).length>=alive().length)finishQuestion()}}
function state(){return{type:'state',phase:host.phase,roomId:room,questionIndex:host.qi,totalQuestions:Q.length,question:host.phase==='question'?publicQ():null,result:host.result,players:host.players,aliveCount:alive().length,playerCount:all().length,ranking:ranks()}}
function publicQ(){let q=Q[host.qi];return{q:q.q,options:q.o,time:q.t,endsAt:host.endsAt}}
function broadcast(){pub(`${base}/host`,state())}function startGame(){if(all().length===0){alert('参加者がまだ入室していません。');return}nextQuestion()}
function nextQuestion(){if(host.qi>=Q.length-1){host.phase='final';clearInterval(hostTimer);cancelAnimationFrame(hostRAF);renderHostFinal();broadcast();return}host.qi++;host.phase='question';host.answers={};host.result=null;let q=Q[host.qi];host.remain=q.t;host.endsAt=Date.now()+q.t*1000;all().forEach(p=>{p.lastCorrect=null;p.lastAnswer=null});renderHostQuestion();broadcast();startHostTimer()}
function animateBar(barId,boxId,endsAt,total,rafSetter){function tick(){let left=Math.max(0,(endsAt-Date.now())/(total*1000)),bar=document.getElementById(barId),box=document.getElementById(boxId);if(bar){bar.style.transform=`scaleX(${left})`;bar.style.background=left<=.25?'#EF4444':'linear-gradient(90deg,#001E62,#3B82F6)'}if(box){box.className=box.className.replace(/bg-white text-\[#001E62\]|bg-red-500 text-white/g,left<=.25?'bg-red-500 text-white':'bg-white text-[#001E62]')}if(left>0)rafSetter(requestAnimationFrame(tick))}tick()}
function startHostTimer(){clearInterval(hostTimer);cancelAnimationFrame(hostRAF);hostTimer=setInterval(()=>{host.remain=Math.max(0,Math.ceil((host.endsAt-Date.now())/1000));updateHostLive();if(host.remain<=0)finishQuestion()},200);animateBar('hBar','timeBox',host.endsAt,Q[host.qi].t,v=>hostRAF=v)}
function renderHostQuestion(){let q=Q[host.qi];hostShell(`<section class="panel rounded-[2rem] p-5 md:p-6 fade h-full"><div class="grid lg:grid-cols-[1fr_220px] gap-4 items-start mb-4"><div><p class="text-[#001E62] font-black text-xl">第 ${host.qi+1} 問 / ${Q.length}</p></div><div id="timeBox" class="text-center rounded-[2rem] bg-white text-[#001E62] border px-7 py-4"><p class="font-bold">残り時間</p><p id="hTime" class="text-5xl font-black">${host.remain}</p></div></div><div class="barwrap h-4 bg-slate-200 rounded-full mb-5"><div id="hBar" class="bar"></div></div><div class="grid xl:grid-cols-[1fr_300px] gap-5"><div><h1 class="text-3xl md:text-5xl font-black leading-tight mb-6 text-[#07132f]">${esc(q.q)}</h1><div class="grid md:grid-cols-2 gap-3">${q.o.map((op,i)=>`<div class="rounded-3xl bg-[#F4F7FF] text-[#001E62] p-5 text-2xl font-black flex items-center gap-4"><span class="rounded-full bg-[#001E62] text-white w-12 h-12 flex items-center justify-center shrink-0">${String.fromCharCode(65+i)}</span><span>${esc(op)}</span></div>`).join('')}</div></div><aside><div id="answerBox" class="rounded-3xl bg-[#F4F7FF] p-6"><p class="text-slate-600 font-bold">回答状況</p><p class="text-5xl font-black text-[#001E62]"><span id="hAnswered">0</span> / <span id="hAlive">${alive().length}</span></p><p class="mt-2 text-sm text-slate-500">未回答は不正解扱いです</p></div></aside></div></section>`);updateHostLive()}
function updateHostLive(){let t=host.remain,a=Object.keys(host.answers).length,live=alive().length,ht=document.getElementById('hTime'),ans=document.getElementById('hAnswered'),al=document.getElementById('hAlive');if(ht)ht.textContent=t;if(ans)ans.textContent=a;if(al)al.textContent=live}
function finishQuestion(){if(host.phase!=='question')return;clearInterval(hostTimer);cancelAnimationFrame(hostRAF);let q=Q[host.qi],counts=[0,0,0,0],voters=[[],[],[],[]];Object.entries(host.answers).forEach(([pid,a])=>{if(a>=0&&a<=3){counts[a]++;let p=host.players[pid];if(p)voters[a].push(p.name)}});all().forEach(p=>{if(p.eliminated)return;let ans=host.answers[p.id],ok=ans===q.c;p.lastAnswer=ans??null;p.lastCorrect=ok;if(ok)p.score+=100;else{p.wrong++;if(p.wrong>=MAX_WRONG)p.eliminated=true}});host.phase='result';host.result={questionText:q.q,options:q.o,correct:q.c,correctText:q.o[q.c],counts,voters,explain:q.e,title:q.v,sub:q.s,kind:q.k};renderHostResult();broadcast()}
function renderHostResult(){let r=host.result;hostShell(`<section class="grid xl:grid-cols-[1.03fr_.97fr] gap-5 fade h-full"><div class="panel rounded-[2rem] p-5"><p class="text-[#001E62] font-black text-xl mb-2">正解発表</p><h1 class="text-2xl md:text-3xl font-black mb-4 text-[#07132f] leading-tight">${esc(r.questionText)}</h1><div class="bg-white rounded-[2rem] p-4 border"><canvas id="chart" height="175"></canvas></div><div class="grid grid-cols-2 gap-3 mt-4"><div class="rounded-2xl bg-[#F4F7FF] p-4"><p class="text-slate-600 font-bold">生存者</p><p class="text-4xl font-black text-[#001E62]">${alive().length}</p></div><div class="rounded-2xl bg-[#F4F7FF] p-4"><p class="text-slate-600 font-bold">脱落者</p><p class="text-4xl font-black text-[#001E62]">${all().filter(p=>p.eliminated).length}</p></div></div></div><div class="panel rounded-[2rem] p-5 flex flex-col"><div class="rounded-[2rem] gold p-5 mb-4"><p class="text-4xl font-black">${String.fromCharCode(65+r.correct)}</p><p class="text-2xl font-black mt-1">${esc(r.correctText)}</p></div>${visual(r.kind,r.title,r.sub)}<div class="rounded-3xl bg-[#F4F7FF] p-4 my-4"><p class="text-[#001E62] font-black mb-1">ちょう解説</p><p class="text-base leading-relaxed font-bold text-slate-700">${esc(r.explain)}</p></div><button onclick="nextQuestion()" class="btn mt-auto w-full rounded-3xl blue py-4 font-black text-2xl">${host.qi>=Q.length-1?'ランキングへ':'次の問題へ'}</button></div></section>`);setTimeout(drawChart,0)}
function drawChart(){if(!window.Chart||!host.result)return;let c=document.getElementById('chart');if(!c)return;if(chart)chart.destroy();let r=host.result;chart=new Chart(c,{type:'bar',data:{labels:r.options.map((o,i)=>`${String.fromCharCode(65+i)}. ${o}`),datasets:[{label:'回答数',data:r.counts,backgroundColor:r.options.map((_,i)=>i===r.correct?'#FACC15':'#001E62'),borderRadius:12}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:(ctx)=>{let names=r.voters[ctx.dataIndex]||[];return names.length?'選択者：'+names.join('、'):'選択者：なし'}}}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}})}
function renderHostFinal(){hostShell(`<section class="panel rounded-[2rem] p-8 md:p-12 text-center fade h-full"><div class="text-yellow-500 mb-4">${icon('trophy','w-20 h-20')}</div><p class="text-[#001E62] font-black tracking-widest text-xl mb-2">FINAL RESULT</p><h1 class="text-5xl md:text-7xl font-black mb-8 text-[#001E62]">ランキング</h1><div class="max-w-4xl mx-auto space-y-3">${ranks().map((p,i)=>`<div class="rounded-[2rem] ${i===0?'rank1':'rankN'} p-4 md:p-5 flex items-center justify-between shadow-xl border"><div class="flex items-center gap-4"><div class="w-12 md:w-14 h-12 md:h-14 rounded-full bg-[#001E62] text-white flex items-center justify-center text-2xl font-black">${i+1}</div><div class="text-left"><p class="text-2xl font-black">${esc(p.name)}</p><p class="font-bold opacity-80">不正解 ${p.wrong}問 / ${MAX_WRONG}問 ${p.eliminated?'・脱落':'・生存'}</p></div></div><p class="text-4xl font-black">${p.score}</p></div>`).join('')}</div></section>`)}
function renderPlayerLogin(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5 safe"><section class="glass rounded-[2rem] p-7 text-center w-full max-w-md fade"><img src="${LOGO}" class="logo-sm mx-auto mb-6"><p class="text-[#001E62] font-black text-xl mb-1">Room ID：${esc(room)}</p><h1 class="text-3xl font-black mb-3 text-[#001E62]">ニックネームを入力</h1><input id="nickname" maxlength="10" value="${esc(player.name)}" class="w-full rounded-2xl p-5 text-[#001E62] font-black text-2xl text-center outline-none mb-5 border" placeholder="お名前"><button onclick="joinPlayer()" class="btn w-full rounded-2xl gold py-5 font-black text-xl">入室する</button><p id="msg" class="mt-5 text-slate-600 text-sm"></p></section></main>`}
function joinPlayer(){let name=document.getElementById('nickname').value.trim().slice(0,10);if(!name){document.getElementById('msg').textContent='ニックネームを入力してください。';return}player.name=name;saveP();connect(()=>{client.subscribe(`${base}/host`);pub(`${base}/player`,{type:'join',id:player.id,name:player.name});renderPlayerWaiting('入室しました。開始までお待ちください。')})}
function onPlayer(d){if(d.type!=='state')return;let me=d.players&&d.players[player.id];if(me){player.score=me.score;player.wrong=me.wrong;player.eliminated=me.eliminated;saveP()}if(player.eliminated&&d.phase!=='final'){clearInterval(playerTimer);cancelAnimationFrame(playerRAF);renderPlayerEliminated();return}if(d.phase==='lobby')renderPlayerWaiting('入室しました。開始までお待ちください。');if(d.phase==='question'){if(player.lastQi!==d.questionIndex){player.selected=null;player.locked=false;player.lastQi=d.questionIndex}renderPlayerQuestion(d);startPlayerTimer(d.question.endsAt,d.question.time)}if(d.phase==='result'){clearInterval(playerTimer);cancelAnimationFrame(playerRAF);renderPlayerResult(d,me)}if(d.phase==='final'){clearInterval(playerTimer);cancelAnimationFrame(playerRAF);renderPlayerFinal(d)}}
function playerShell(c,danger=false){app.innerHTML=`<main id="playerMain" class="min-h-screen p-4 safe ${danger?'!bg-red-900':''}"><header class="flex items-center justify-between mb-4"><img src="${LOGO}" class="logo-sm"><div data-conn class="inline-flex items-center gap-1 rounded-full px-3 py-1 text-xs font-black ${player.connected?'bg-green-400 text-[#001E62]':'bg-red-500 text-white'}">${icon(player.connected?'wifi':'off','w-3 h-3')}${player.connected?'接続中':'再接続中'}</div></header>${c}</main>`}
function renderPlayerWaiting(msg){playerShell(`<section class="glass rounded-[2rem] p-7 text-center fade min-h-[72vh] flex flex-col justify-center"><div class="text-[#001E62] mx-auto mb-6">${icon('phone','w-20 h-20')}</div><h1 class="text-3xl font-black mb-4 text-[#001E62]">待機中</h1><p class="text-slate-600 text-lg font-bold">${esc(msg)}</p><div class="mt-8 rounded-2xl bg-[#F4F7FF] p-5"><p class="text-slate-600 font-bold">あなたの名前</p><p class="text-3xl font-black text-[#001E62]">${esc(player.name)}</p></div></section>`)}
function renderPlayerQuestion(d){let q=d.question;playerShell(`<section class="fade"><div class="glass rounded-[2rem] p-5 mb-4"><div class="flex justify-between gap-3 items-center mb-3"><p class="text-[#001E62] font-black">第 ${d.questionIndex+1} 問 / ${d.totalQuestions}</p><div id="pTimeBox" class="rounded-2xl bg-white text-[#001E62] px-4 py-2 text-center border"><p class="text-xs font-bold">残り</p><p id="pTime" class="text-3xl font-black">${q.time}</p></div></div><div class="barwrap h-3 bg-slate-200 rounded-full mb-4"><div id="pBar" class="bar"></div></div><h1 class="text-xl font-black leading-snug text-[#07132f]">${esc(q.q)}</h1></div><div class="space-y-3">${q.options.map((op,i)=>`<button ${player.locked?'disabled':''} onclick="sendAnswer(${i})" class="opt btn w-full rounded-3xl p-5 text-left font-black text-lg shadow-xl ${player.selected===i?'gold':'bg-white text-[#001E62]'} ${player.locked&&player.selected!==i?'opacity-45':''}"><div class="flex items-center gap-4"><span class="shrink-0 w-11 h-11 rounded-full bg-[#001E62] text-white flex items-center justify-center">${String.fromCharCode(65+i)}</span><span>${esc(op)}</span></div></button>`).join('')}</div><div class="mt-4 glass rounded-2xl p-4 text-center"><p id="sendMsg" class="${player.locked?'text-[#001E62]':'text-slate-600'} font-black">${player.locked?'送信しました。大画面をご覧ください。':'答えを1つ選んでください。'}</p><p class="mt-2 text-sm text-slate-600 font-bold">不正解数：${player.wrong}問 / ${MAX_WRONG}問</p></div></section>`)}
function animateBar(barId,boxId,endsAt,total,rafSetter){function tick(){let left=Math.max(0,(endsAt-Date.now())/(total*1000)),bar=document.getElementById(barId),box=document.getElementById(boxId);if(bar){bar.style.transform=`scaleX(${left})`;bar.style.background=left<=.25?'#EF4444':'linear-gradient(90deg,#001E62,#3B82F6)'}if(box){box.className=box.className.replace(/bg-white text-\[#001E62\]|bg-red-500 text-white/g,left<=.25?'bg-red-500 text-white':'bg-white text-[#001E62]')}if(left>0)rafSetter(requestAnimationFrame(tick))}tick()}
function startPlayerTimer(endsAt,total){clearInterval(playerTimer);cancelAnimationFrame(playerRAF);playerTimer=setInterval(()=>{let left=Math.max(0,Math.ceil((endsAt-Date.now())/1000)),t=document.getElementById('pTime');if(t)t.textContent=left;if(left<=0)clearInterval(playerTimer)},200);animateBar('pBar','pTimeBox',endsAt,total,v=>playerRAF=v)}
function safeVibrate(p){try{if(navigator.vibrate)return navigator.vibrate(p)}catch(e){}return false}
function sendAnswer(i){if(player.locked||player.eliminated)return;safeVibrate(8);player.selected=i;player.locked=true;pub(`${base}/player`,{type:'answer',id:player.id,answer:i});document.querySelectorAll('button[onclick^="sendAnswer"]').forEach((b,idx)=>{b.disabled=true;if(idx===i)b.className=b.className.replace('bg-white text-[#001E62]','gold');else b.classList.add('opacity-45')});let m=document.getElementById('sendMsg');if(m){m.textContent='送信しました。大画面をご覧ください。';m.className='text-[#001E62] font-black'}toast('送信しました。')}
function renderPlayerResult(d,me){let r=d.result,ok=me&&me.lastCorrect===true;if(!ok){setTimeout(()=>safeVibrate([220,80,220,80,320]),80);setTimeout(()=>{let el=document.getElementById('playerMain');if(el){el.classList.add('shake');setTimeout(()=>el.classList.remove('shake'),500)}},30)}playerShell(`<section class="glass rounded-[2rem] p-5 text-center fade"><div class="${ok?'text-green-500':'text-red-500'} mx-auto mb-4">${icon(ok?'check':'x','w-20 h-20')}</div><h1 class="text-4xl font-black ${ok?'text-green-600':'text-red-600'} mb-4">${ok?'正解です！':'残念、不正解です'}</h1><div class="rounded-3xl gold p-5 mb-4"><p class="font-bold mb-1">正解</p><p class="text-2xl font-black">${String.fromCharCode(65+r.correct)}. ${esc(r.correctText)}</p></div>${visual(r.kind,r.title,r.sub)}<div class="rounded-3xl bg-[#F4F7FF] p-4 my-4 text-left"><p class="text-[#001E62] font-black mb-2">ちょう解説</p><p class="font-bold leading-relaxed text-slate-700">${esc(r.explain)}</p></div><div class="rounded-3xl bg-[#F4F7FF] p-4"><p class="text-slate-600 font-bold">あなたの不正解数</p><p class="text-5xl font-black ${player.wrong>=6?'text-red-600':'text-[#001E62]'}">${player.wrong}問 / ${MAX_WRONG}問</p></div><p class="mt-4 text-slate-600 font-bold">次の問題までお待ちください。</p></section>`)}
function renderPlayerEliminated(){playerShell(`<section class="rounded-[2rem] bg-red-700/90 border border-red-300 p-8 text-center fade min-h-[78vh] flex flex-col items-center justify-center text-white"><div class="mb-6">${icon('skull','w-32 h-32')}</div><h1 class="text-6xl font-black mb-4">脱落</h1><p class="text-xl font-bold mb-6">不正解が${MAX_WRONG}問に達しました。</p><div class="rounded-3xl bg-white text-red-700 p-6 w-full"><p class="font-bold">最終スコア</p><p class="text-5xl font-black">${player.score}</p></div><p class="mt-6 text-red-100">以降の問題には回答できません。大画面をご覧ください。</p></section>`,true)}
function renderPlayerFinal(d){let rk=d.ranking||[];playerShell(`<section class="glass rounded-[2rem] p-6 text-center fade"><div class="text-yellow-500 mx-auto mb-5">${icon('trophy','w-24 h-24')}</div><h1 class="text-4xl font-black mb-6 text-[#001E62]">お疲れさまでした！</h1><div class="rounded-3xl gold p-6 mb-6"><p class="font-bold">あなたのスコア</p><p class="text-6xl font-black">${player.score}</p><p class="font-bold mt-2">不正解 ${player.wrong}問 / ${MAX_WRONG}問</p></div><h2 class="text-2xl font-black mb-4 text-[#001E62]">TOP 5</h2><div class="space-y-3">${rk.map((p,i)=>`<div class="rounded-2xl bg-[#F4F7FF] p-4 flex justify-between items-center"><div class="text-left"><p class="font-black text-[#001E62]">${i+1}. ${esc(p.name)}</p><p class="text-xs text-slate-600">${p.eliminated?'脱落':'生存'}・不正解 ${p.wrong}/${MAX_WRONG}</p></div><p class="text-2xl font-black text-[#001E62]">${p.score}</p></div>`).join('')}</div></section>`)}
</script></body></html>
