<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ASICS x Vietnam Party Quiz V3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--asics:#001E62;--yellow:#FACC15;--red:#DC2626;--green:#22C55E;--ink:#07112F}
    *{box-sizing:border-box;font-family:'Noto Sans JP',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;color:white;background:linear-gradient(135deg,rgba(0,30,98,.97),rgba(0,11,45,.99)),repeating-linear-gradient(45deg,rgba(255,255,255,.09) 0,rgba(255,255,255,.09) 2px,transparent 2px,transparent 20px);overflow-x:hidden}
    .speed-bg{background:linear-gradient(135deg,rgba(0,30,98,.97),rgba(0,11,45,.99)),repeating-linear-gradient(45deg,rgba(255,255,255,.09) 0,rgba(255,255,255,.09) 2px,transparent 2px,transparent 20px)}
    .glass{background:rgba(255,255,255,.105);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(14px);box-shadow:0 24px 80px rgba(0,0,0,.24)}
    .btn{transition:transform .12s ease,opacity .12s ease,box-shadow .12s ease}.btn:active{transform:scale(.975)}.btn:disabled{opacity:.55;cursor:not-allowed}
    .fade{animation:fade .22s ease both}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .pulse{animation:pulse 1.7s infinite}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(250,204,21,.55)}70%{box-shadow:0 0 0 22px rgba(250,204,21,0)}100%{box-shadow:0 0 0 0 rgba(250,204,21,0)}}
    .opt{min-height:88px}.qr-box canvas,.qr-box img{margin:auto;border-radius:16px}.safe{padding-bottom:env(safe-area-inset-bottom)}
    .rank1{background:#FACC15;color:#001E62}.rankN{background:#fff;color:#001E62}
    .soft-update{transition:width .25s ease,background-color .2s ease,color .2s ease,transform .15s ease}.soft-pop{animation:softpop .2s ease}@keyframes softpop{50%{transform:scale(1.035)}}
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-white text-[#001E62] font-black rounded-full px-6 py-3 shadow-2xl"></div>

<script>
'use strict';
const BROKER_URL='wss://broker.emqx.io:8084/mqtt';
const TOPIC_PREFIX='partyquiz/asics-vietnam-v3';
const ASICS_LOGO='https://upload.wikimedia.org/wikipedia/commons/b/b1/Asics_Logo.svg';
const MAX_WRONG=5;

const QUESTIONS=[
 {q:'ASICSの前身である鬼塚株式会社が1950年に発売した、最初のスポーツシューズは何でしょう？',options:['ランニングシューズ','バスケットボールシューズ','バレーボールシューズ','サッカーシューズ'],correct:1,time:20,img:'1950 FIRST SHOE',sub:'Basketball Shoes',explain:'1950年、鬼塚株式会社が最初に手がけたスポーツシューズはバスケットボールシューズでした。ここからASICSのものづくりの歴史が始まります。'},
 {q:'1986年、ASICSで初めてGELテクノロジーを搭載したシューズはどれでしょう？',options:['GT-II','GEL-KAYANO','TARTHER','MEXICO 66'],correct:0,time:20,img:'GEL TECHNOLOGY',sub:'GT-II / 1986',explain:'GELテクノロジーを初めて搭載したモデルとして知られるのがGT-IIです。衝撃緩衝性を高める技術として、その後のASICSを代表する要素になりました。'},
 {q:'ASICSを象徴するサイドのラインは、当時どのように呼ばれていたでしょう？',options:['ジャパンライン','スピードライン','メキシコライン','オリンピックライン'],correct:2,time:20,img:'MEXICO LINE',sub:'Iconic Stripe',explain:'ASICSのサイドラインは、1960年代に「メキシコライン」と呼ばれていました。現在もブランドを象徴するデザインとして親しまれています。'},
 {q:'初代GEL-KAYANOのデザインは、どの昆虫から着想を得たと言われているでしょう？',options:['トンボ','カブトムシ','クワガタムシ','チョウ'],correct:2,time:20,img:'GEL-KAYANO',sub:'Stag Beetle',explain:'GEL-KAYANOの初代モデルは、安定感や力強さを表現するため、クワガタムシから着想を得たと言われています。'},
 {q:'ブランド名「ASICS」の由来となったラテン語の言葉に関係する、古代ローマの詩人は誰でしょう？',options:['ウェルギリウス','ホラティウス','オウィディウス','ユウェナリス'],correct:3,time:20,img:'ANIMA SANA',sub:'Juvenalis',explain:'ASICSは「Anima Sana In Corpore Sano」に由来します。この考え方は古代ローマの詩人ユウェナリスの言葉に関連しています。'},
 {q:'ベトナムで計画されている南北高速鉄道について、設計最高速度として知られている数値はどれでしょう？',options:['250km/h','300km/h','350km/h','400km/h'],correct:2,time:20,img:'VIETNAM HSR',sub:'350 km/h',explain:'ベトナムの南北高速鉄道計画では、設計最高速度として350km/hがよく取り上げられます。ハノイとホーチミンを結ぶ大規模プロジェクトです。'},
 {q:'ベトナムの通貨単位「Đồng」のもともとの意味に最も近いものはどれでしょう？',options:['金','銀','銅','米'],correct:2,time:20,img:'VIETNAM ĐỒNG',sub:'Copper',explain:'「Đồng」はベトナムの通貨単位で、もともとは「銅」を意味する言葉に由来します。漢字文化圏とのつながりも感じられる表現です。'},
 {q:'ベトナム国旗の黄色い星が象徴するとされる5つの階層に、一般的に含まれないものはどれでしょう？',options:['労働者','農民','兵士','商人'],correct:3,time:20,img:'YELLOW STAR',sub:'Vietnam Flag',explain:'黄色い星の5つの角は、一般的に労働者・農民・兵士・知識人・青年を象徴すると説明されます。商人は通常含まれません。'},
 {q:'かつて「サイゴン」と呼ばれていた、ベトナム最大級の都市はどこでしょう？',options:['ハノイ','ダナン','ホーチミン市','フエ'],correct:2,time:20,img:'SAIGON',sub:'Ho Chi Minh City',explain:'ホーチミン市は、かつて「サイゴン」と呼ばれていました。現在も経済・商業の中心地として大きな存在感があります。'},
 {q:'ベトナム語で「ありがとう」を意味する表現はどれでしょう？',options:['Xin chào','Cảm ơn','Tạm biệt','Không sao'],correct:1,time:20,img:'CẢM ƠN',sub:'Thank you',explain:'ベトナム語で「ありがとう」は「Cảm ơn」です。「Xin chào」はこんにちは、「Tạm biệt」はさようならを意味します。'}
];

const app=document.getElementById('app');
let role=null,roomId=null,baseTopic=null,client=null,chart=null,hostTimer=null,playerTimer=null,lastHostQuestionKey='';
let host={phase:'home',players:{},questionIndex:-1,answers:{},remaining:20,result:null,connected:false,endsAt:null};
let player=loadPlayer();

function loadPlayer(){let s={};try{s=JSON.parse(localStorage.getItem('asicsQuizPlayerV3')||'{}')}catch{};const id=s.id||(crypto.randomUUID?crypto.randomUUID():'p_'+Math.random().toString(36).slice(2));const p={id,name:s.name||'',score:s.score||0,wrong:s.wrong||0,eliminated:!!s.eliminated,selected:null,locked:false,joined:false,lastQuestionIndex:-1,connected:false};savePlayerObj(p);return p}
function savePlayerObj(p=player){localStorage.setItem('asicsQuizPlayerV3',JSON.stringify({id:p.id,name:p.name,score:p.score,wrong:p.wrong,eliminated:p.eliminated}))}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function icon(n,cls='w-6 h-6'){const m={monitor:'<path d="M3 5h18v11H3z"/><path d="M8 21h8"/><path d="M12 16v5"/>',phone:'<rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/>',play:'<polygon points="6 3 20 12 6 21 6 3"/>',wifi:'<path d="M5 13a10 10 0 0 1 14 0"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M12 20h.01"/>',off:'<path d="m2 2 20 20"/><path d="M5 13a10 10 0 0 1 5.2-2.7"/><path d="M19 13a10 10 0 0 0-5.2-2.7"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/>',qrcode:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h2v2h-2zM18 14h3v3M14 18h3v3M19 19h2v2"/>',skull:'<path d="M12 2a8 8 0 0 0-8 8c0 3 2 5 4 6v4h8v-4c2-1 4-3 4-6a8 8 0 0 0-8-8z"/><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/><path d="M10 15h4"/>',check:'<path d="M20 6 9 17l-5-5"/>',x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',trophy:'<path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v7a5 5 0 0 1-10 0V4z"/><path d="M5 5H3v3a4 4 0 0 0 4 4"/><path d="M19 5h2v3a4 4 0 0 1-4 4"/>',users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/>'};return `<svg class="${cls} inline-block align-middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">${m[n]||''}</svg>`}
function toast(s){const t=document.getElementById('toast');t.textContent=s;t.classList.remove('hidden');clearTimeout(toast.id);toast.id=setTimeout(()=>t.classList.add('hidden'),1800)}
function makeRoom(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:5},()=>c[Math.floor(Math.random()*c.length)]).join('')}
function publish(topic,payload){if(client&&client.connected)client.publish(topic,JSON.stringify(payload))}
function allPlayers(){return Object.values(host.players)}
function alivePlayers(){return allPlayers().filter(p=>!p.eliminated)}
function ranking(){return allPlayers().sort((a,b)=>b.score-a.score||a.wrong-b.wrong).slice(0,5)}
function joinUrl(){const u=new URL(location.href);u.search='';u.searchParams.set('room',roomId);return u.toString()}
function explImg(q){const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='900' height='520' viewBox='0 0 900 520'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop stop-color='%23001E62'/><stop offset='1' stop-color='%230055A5'/></linearGradient><pattern id='p' width='36' height='36' patternUnits='userSpaceOnUse' patternTransform='rotate(45)'><rect width='36' height='36' fill='none'/><path d='M0 0h36' stroke='rgba(255,255,255,.16)' stroke-width='3'/></pattern></defs><rect width='900' height='520' rx='42' fill='url(%23g)'/><rect width='900' height='520' fill='url(%23p)'/><circle cx='735' cy='120' r='105' fill='%23FACC15' opacity='.9'/><circle cx='170' cy='405' r='150' fill='rgba(255,255,255,.1)'/><text x='70' y='225' font-family='Arial, sans-serif' font-weight='900' font-size='68' fill='white'>${esc(q.img)}</text><text x='74' y='305' font-family='Arial, sans-serif' font-weight='700' font-size='42' fill='%23FACC15'>${esc(q.sub)}</text><text x='70' y='430' font-family='Arial, sans-serif' font-weight='900' font-size='34' fill='white'>ASICS x VIETNAM QUIZ</text></svg>`;return 'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg)}

window.addEventListener('load',()=>{const p=new URLSearchParams(location.search);if(p.get('room')){role='player';roomId=p.get('room').toUpperCase();baseTopic=`${TOPIC_PREFIX}/${roomId}`;renderPlayerLogin()}else renderHome()});
function mqttConnect(cb){if(!window.mqtt){toast('通信ライブラリを読み込めませんでした。');return}if(client&&client.connected){cb&&cb();return}client=mqtt.connect(BROKER_URL,{clientId:`asics_${role}_${Math.random().toString(36).slice(2,9)}`,clean:true,reconnectPeriod:2000,connectTimeout:8000});client.on('connect',()=>{role==='host'?host.connected=true:player.connected=true;cb&&cb();renderCurrent()});client.on('reconnect',()=>{role==='host'?host.connected=false:player.connected=false;updateConn()});client.on('close',()=>{role==='host'?host.connected=false:player.connected=false;updateConn()});client.on('message',(topic,msg)=>{let d;try{d=JSON.parse(msg.toString())}catch{return}role==='host'?handleHost(d):handlePlayer(d)})}
function updateConn(){document.querySelectorAll('[data-conn]').forEach(el=>{const ok=role==='host'?host.connected:player.connected;el.className=`inline-flex items-center gap-2 rounded-full px-4 py-2 font-black ${ok?'bg-green-400 text-[#001E62]':'bg-red-500 text-white'}`;el.innerHTML=`${icon(ok?'wifi':'off','w-4 h-4')}${ok?'接続中':'再接続中'}`})}

function renderHome(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5 speed-bg"><section class="glass rounded-[2rem] p-8 md:p-12 text-center w-full max-w-3xl fade"><img src="${ASICS_LOGO}" class="mx-auto w-56 md:w-72 bg-white rounded-2xl px-8 py-5 mb-8"><p class="text-yellow-300 font-black tracking-widest mb-3">ASICS x VIETNAM</p><h1 class="text-4xl md:text-6xl font-black mb-4">懇親会クイズ大会</h1><p class="text-blue-100 mb-10">ホストはPC・投影画面で進行、参加者はスマートフォンから回答します。</p><div class="grid md:grid-cols-2 gap-5"><button onclick="startHost()" class="btn rounded-3xl bg-white text-[#001E62] p-8 font-black text-2xl shadow-2xl">${icon('monitor','w-12 h-12')}<br>ホスト<br><span class="text-base">進行役</span></button><button onclick="manualRoom()" class="btn rounded-3xl bg-yellow-300 text-[#001E62] p-8 font-black text-2xl shadow-2xl">${icon('phone','w-12 h-12')}<br>参加者<br><span class="text-base">Room IDを入力</span></button></div></section></main>`}
function manualRoom(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5 speed-bg"><section class="glass rounded-[2rem] p-7 text-center w-full max-w-md fade"><img src="${ASICS_LOGO}" class="mx-auto w-44 bg-white rounded-2xl px-6 py-4 mb-6"><h1 class="text-3xl font-black mb-3">Room IDを入力</h1><p class="text-blue-100 mb-6">ホスト画面に表示されている5桁のIDを入力してください。</p><input id="manualRoom" maxlength="5" class="w-full text-center text-3xl tracking-[.3em] uppercase rounded-2xl p-5 text-[#001E62] font-black outline-none mb-5" placeholder="A7K29"><button onclick="goManualRoom()" class="btn w-full rounded-2xl bg-yellow-300 text-[#001E62] py-5 font-black text-xl">入室する</button><button onclick="renderHome()" class="mt-5 underline text-blue-100">戻る</button></section></main>`}
function goManualRoom(){const v=document.getElementById('manualRoom').value.trim().toUpperCase();if(v.length!==5){alert('5桁のRoom IDを入力してください。');return}location.href=`${location.pathname}?room=${encodeURIComponent(v)}`}

function startHost(){role='host';roomId=makeRoom();baseTopic=`${TOPIC_PREFIX}/${roomId}`;host={phase:'lobby',players:{},questionIndex:-1,answers:{},remaining:20,result:null,connected:false,endsAt:null};mqttConnect(()=>{client.subscribe(`${baseTopic}/player`);renderHostLobby();broadcast()})}
function hostShell(content){app.innerHTML=`<main class="min-h-screen p-4 md:p-7 speed-bg"><header class="flex items-center justify-between gap-4 mb-5"><div class="flex items-center gap-4"><img src="${ASICS_LOGO}" class="w-36 md:w-48 bg-white rounded-xl px-4 md:px-5 py-3"><div><p class="text-blue-100 font-bold tracking-widest text-sm md:text-base">ASICS x VIETNAM PARTY QUIZ</p><p class="text-2xl md:text-3xl font-black">Room ID：<span class="text-yellow-300">${roomId}</span></p></div></div><div class="text-right"><div data-conn class="inline-flex items-center gap-2 rounded-full px-4 py-2 font-black ${host.connected?'bg-green-400 text-[#001E62]':'bg-red-500 text-white'}">${icon(host.connected?'wifi':'off','w-4 h-4')}${host.connected?'接続中':'再接続中'}</div><p class="mt-2 text-blue-100 font-bold">参加者 <span id="hTotal">${allPlayers().length}</span>名</p></div></header>${content}</main>`}
function renderHostLobby(){host.phase='lobby';lastHostQuestionKey='';const url=joinUrl();hostShell(`<section class="grid lg:grid-cols-[420px_1fr] gap-6 fade"><div class="glass rounded-[2rem] p-7 text-center"><h1 class="text-4xl font-black mb-5">参加受付中</h1><div id="qrcode" class="qr-box bg-white rounded-[2rem] p-6 inline-flex items-center justify-center mb-5 w-[320px] h-[320px] max-w-full">${icon('qrcode','w-32 h-32 text-[#001E62]')}</div><p class="text-blue-100 break-all text-sm mb-4">${esc(url)}</p><div class="rounded-3xl bg-white/10 p-5 mb-6"><p class="text-blue-100 font-bold">現在の参加者数</p><p class="text-7xl font-black text-yellow-300">${allPlayers().length}</p></div><button onclick="startGame()" class="btn pulse w-full rounded-3xl bg-yellow-300 text-[#001E62] py-6 font-black text-3xl">${icon('play','w-8 h-8')} ゲーム開始</button></div><div class="glass rounded-[2rem] p-7"><h2 class="text-3xl font-black mb-5">参加者リスト</h2><div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4">${allPlayers().length?allPlayers().map(p=>`<div class="rounded-2xl bg-white/10 p-4 font-bold flex justify-between"><span>${esc(p.name)}</span><span class="text-green-300">待機中</span></div>`).join(''):'<p class="text-blue-100 text-xl">QRコードを読み取って入室してください。</p>'}</div></div></section>`);setTimeout(()=>{const el=document.getElementById('qrcode');if(el&&window.QRCode){el.innerHTML='';new QRCode(el,{text:url,width:300,height:300,colorDark:'#001E62',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H})}},0)}
function handleHost(d){if(d.type==='join'){const old=host.players[d.id]||{};host.players[d.id]={id:d.id,name:String(d.name||'ゲスト').slice(0,10),score:old.score||0,wrong:old.wrong||0,eliminated:!!old.eliminated,lastCorrect:old.lastCorrect??null,lastAnswer:old.lastAnswer??null};if(host.phase==='lobby')renderHostLobby();broadcast()} if(d.type==='answer'){if(host.phase!=='question')return;const p=host.players[d.id];if(!p||p.eliminated||host.answers[d.id]!==undefined)return;host.answers[d.id]=Number(d.answer);p.lastAnswer=Number(d.answer);updateHostLive();broadcast(false);if(Object.keys(host.answers).length>=alivePlayers().length)finishQuestion()}}
function hostPayload(){return{type:'state',phase:host.phase,roomId,questionIndex:host.questionIndex,totalQuestions:QUESTIONS.length,question:host.phase==='question'?publicQuestion():null,result:host.result,players:host.players,aliveCount:alivePlayers().length,playerCount:allPlayers().length,ranking:ranking()}}
function publicQuestion(){const q=QUESTIONS[host.questionIndex];return{q:q.q,options:q.options,time:q.time,endsAt:host.endsAt}}
function broadcast(){publish(`${baseTopic}/host`,hostPayload())}
function startGame(){if(allPlayers().length===0){alert('参加者がまだ入室していません。');return}nextQuestion()}
function nextQuestion(){if(host.questionIndex>=QUESTIONS.length-1){host.phase='final';clearInterval(hostTimer);renderHostFinal();broadcast();return}host.questionIndex++;host.phase='question';host.answers={};host.result=null;const q=QUESTIONS[host.questionIndex];host.remaining=q.time;host.endsAt=Date.now()+q.time*1000;Object.values(host.players).forEach(p=>{p.lastCorrect=null;p.lastAnswer=null});renderHostQuestion();broadcast();startHostTimer()}
function startHostTimer(){clearInterval(hostTimer);hostTimer=setInterval(()=>{host.remaining=Math.max(0,Math.ceil((host.endsAt-Date.now())/1000));updateHostLive();if(host.remaining<=0)finishQuestion()},250)}
function renderHostQuestion(){const key=`${host.questionIndex}`;const q=QUESTIONS[host.questionIndex];lastHostQuestionKey=key;hostShell(`<section class="glass rounded-[2rem] p-6 md:p-8 fade"><div class="grid lg:grid-cols-[1fr_260px] gap-6 items-start mb-6"><div><p class="text-yellow-300 font-black text-2xl">第 ${host.questionIndex+1} 問 / ${QUESTIONS.length}</p><div class="w-80 max-w-full h-3 bg-white/20 rounded-full mt-3 overflow-hidden"><div class="h-full bg-yellow-300 rounded-full" style="width:${(host.questionIndex+1)/QUESTIONS.length*100}%"></div></div></div><div id="timeBox" class="soft-update text-center rounded-[2rem] bg-white text-[#001E62] px-8 py-5"><p class="font-bold">残り時間</p><p id="hTime" class="text-6xl font-black">${host.remaining}</p></div></div><div class="h-4 bg-white/20 rounded-full mb-7 overflow-hidden"><div id="hTimeBar" class="soft-update h-full bg-yellow-300" style="width:100%"></div></div><div class="grid xl:grid-cols-[1fr_340px] gap-6"><div><h1 class="text-3xl md:text-5xl font-black leading-tight mb-8">${esc(q.q)}</h1><div class="grid md:grid-cols-2 gap-4">${q.options.map((op,i)=>`<div class="rounded-3xl bg-white text-[#001E62] p-5 md:p-6 text-2xl font-black flex items-center gap-4"><span class="rounded-full bg-[#001E62] text-white w-12 h-12 flex items-center justify-center shrink-0">${String.fromCharCode(65+i)}</span><span>${esc(op)}</span></div>`).join('')}</div></div><aside class="space-y-4"><div id="answerBox" class="soft-update rounded-3xl bg-white/10 p-6"><p class="text-blue-100 font-bold">回答状況</p><p class="text-5xl font-black text-yellow-300"><span id="hAnswered">0</span> / <span id="hAlive">${alivePlayers().length}</span></p><p class="mt-2 text-sm text-blue-100">未回答は不正解扱いです</p></div><div class="rounded-3xl bg-white/10 p-5"><p class="text-blue-100 font-bold mb-3">進行メモ</p><p class="text-lg font-bold">参加者のスマートフォンに同じ問題が表示されています。</p></div></aside></div></section>`);updateHostLive()}
function updateHostLive(){const q=QUESTIONS[host.questionIndex];const t=host.remaining;const answered=Object.keys(host.answers).length;const alive=alivePlayers().length;const hTime=document.getElementById('hTime'),bar=document.getElementById('hTimeBar'),box=document.getElementById('timeBox'),ans=document.getElementById('hAnswered'),al=document.getElementById('hAlive'),abox=document.getElementById('answerBox');if(hTime&&hTime.textContent!=String(t)){hTime.textContent=t;box&&box.classList.add('soft-pop');setTimeout(()=>box&&box.classList.remove('soft-pop'),180)}if(bar&&q){bar.style.width=Math.max(0,t/q.time*100)+'%';bar.className=`soft-update h-full ${t<=5?'bg-red-500':'bg-yellow-300'}`}if(box)box.className=`soft-update text-center rounded-[2rem] ${t<=5?'bg-red-500 text-white':'bg-white text-[#001E62]'} px-8 py-5`;if(ans&&ans.textContent!=String(answered)){ans.textContent=answered;abox&&abox.classList.add('soft-pop');setTimeout(()=>abox&&abox.classList.remove('soft-pop'),180)}if(al)al.textContent=alive}
function finishQuestion(){if(host.phase!=='question')return;clearInterval(hostTimer);const q=QUESTIONS[host.questionIndex];const counts=[0,0,0,0];Object.values(host.answers).forEach(a=>{if(a>=0&&a<=3)counts[a]++});Object.values(host.players).forEach(p=>{if(p.eliminated)return;const ans=host.answers[p.id];const ok=ans===q.correct;p.lastAnswer=ans??null;p.lastCorrect=ok;if(ok)p.score+=100;else{p.wrong++;if(p.wrong>=MAX_WRONG)p.eliminated=true}});host.phase='result';host.result={questionIndex:host.questionIndex,questionText:q.q,options:q.options,correct:q.correct,correctText:q.options[q.correct],counts,explain:q.explain,img:explImg(q)};renderHostResult();broadcast()}
function renderHostResult(){const r=host.result;hostShell(`<section class="grid xl:grid-cols-[1.05fr_.95fr] gap-6 fade"><div class="glass rounded-[2rem] p-6 md:p-8"><p class="text-yellow-300 font-black text-2xl mb-2">正解発表</p><h1 class="text-2xl md:text-4xl font-black mb-5">${esc(r.questionText)}</h1><div class="bg-white rounded-[2rem] p-5"><canvas id="chart" height="190"></canvas></div><div class="grid grid-cols-2 gap-4 mt-5"><div class="rounded-2xl bg-white/10 p-5"><p class="text-blue-100 font-bold">生存者</p><p class="text-5xl font-black">${alivePlayers().length}</p></div><div class="rounded-2xl bg-white/10 p-5"><p class="text-blue-100 font-bold">脱落者</p><p class="text-5xl font-black">${allPlayers().filter(p=>p.eliminated).length}</p></div></div></div><div class="glass rounded-[2rem] p-6 md:p-8 flex flex-col"><p class="text-blue-100 font-bold text-xl mb-3">正解</p><div class="rounded-[2rem] bg-yellow-300 text-[#001E62] p-6 mb-5"><p class="text-5xl font-black">${String.fromCharCode(65+r.correct)}</p><p class="text-3xl font-black mt-2">${esc(r.correctText)}</p></div><img src="${r.img}" class="rounded-[2rem] w-full mb-5 bg-white/10" alt="解説画像"><div class="rounded-3xl bg-white/10 p-5 mb-5"><p class="text-yellow-300 font-black mb-2">ひとこと解説</p><p class="text-lg leading-relaxed font-bold">${esc(r.explain)}</p></div><button onclick="nextQuestion()" class="btn mt-auto w-full rounded-3xl bg-white text-[#001E62] py-5 font-black text-2xl">${host.questionIndex>=QUESTIONS.length-1?'ランキングへ':'次の問題へ'}</button></div></section>`);setTimeout(drawChart,0)}
function drawChart(){if(!window.Chart||!host.result)return;const c=document.getElementById('chart');if(!c)return;if(chart)chart.destroy();const r=host.result;chart=new Chart(c,{type:'bar',data:{labels:r.options.map((o,i)=>`${String.fromCharCode(65+i)}. ${o}`),datasets:[{label:'回答数',data:r.counts,backgroundColor:r.options.map((_,i)=>i===r.correct?'#FACC15':'#001E62'),borderRadius:12}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}})}
function renderHostFinal(){hostShell(`<section class="glass rounded-[2rem] p-8 md:p-12 text-center fade"><div class="text-yellow-300 mb-4">${icon('trophy','w-24 h-24')}</div><p class="text-yellow-300 font-black tracking-widest text-2xl mb-3">FINAL RESULT</p><h1 class="text-6xl md:text-8xl font-black mb-10">ランキング</h1><div class="max-w-4xl mx-auto space-y-4 mb-10">${ranking().map((p,i)=>`<div class="rounded-[2rem] ${i===0?'rank1':'rankN'} p-5 md:p-6 flex items-center justify-between shadow-2xl"><div class="flex items-center gap-5"><div class="w-14 md:w-16 h-14 md:h-16 rounded-full bg-[#001E62] text-white flex items-center justify-center text-2xl md:text-3xl font-black">${i+1}</div><div class="text-left"><p class="text-2xl md:text-3xl font-black">${esc(p.name)}</p><p class="font-bold opacity-80">失誤 ${p.wrong} / ${MAX_WRONG} ${p.eliminated?'・脱落':'・生存'}</p></div></div><p class="text-4xl md:text-5xl font-black">${p.score}</p></div>`).join('')}</div><button onclick="location.href=location.pathname" class="btn rounded-3xl bg-white text-[#001E62] px-12 py-5 font-black text-2xl">最初に戻る</button></section>`)}
function renderCurrent(){if(role==='host'){if(host.phase==='lobby')renderHostLobby();else if(host.phase==='question')renderHostQuestion();else if(host.phase==='result')renderHostResult();else if(host.phase==='final')renderHostFinal()}}

function renderPlayerLogin(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5 speed-bg safe"><section class="glass rounded-[2rem] p-7 text-center w-full max-w-md fade"><img src="${ASICS_LOGO}" class="mx-auto w-44 bg-white rounded-2xl px-6 py-4 mb-6"><p class="text-yellow-300 font-black text-xl mb-1">Room ID：${esc(roomId)}</p><h1 class="text-3xl font-black mb-3">ニックネームを入力</h1><p class="text-blue-100 mb-6">10文字以内で入力してください。</p><input id="nickname" maxlength="10" value="${esc(player.name)}" class="w-full rounded-2xl p-5 text-[#001E62] font-black text-2xl text-center outline-none mb-5" placeholder="お名前"><button onclick="joinPlayer()" class="btn w-full rounded-2xl bg-yellow-300 text-[#001E62] py-5 font-black text-xl">入室する</button><p id="msg" class="mt-5 text-blue-100 text-sm"></p></section></main>`}
function joinPlayer(){const name=document.getElementById('nickname').value.trim().slice(0,10);if(!name){document.getElementById('msg').textContent='ニックネームを入力してください。';return}player.name=name;player.joined=true;savePlayerObj();mqttConnect(()=>{client.subscribe(`${baseTopic}/host`);publish(`${baseTopic}/player`,{type:'join',id:player.id,name:player.name});renderPlayerWaiting('入室しました。開始までお待ちください。')})}
function handlePlayer(d){if(d.type!=='state')return;const me=d.players&&d.players[player.id];if(me){player.score=me.score;player.wrong=me.wrong;player.eliminated=me.eliminated;savePlayerObj()}if(player.eliminated&&d.phase!=='final'){clearInterval(playerTimer);renderPlayerEliminated();return}if(d.phase==='lobby')renderPlayerWaiting('入室しました。開始までお待ちください。');if(d.phase==='question'){if(player.lastQuestionIndex!==d.questionIndex){player.selected=null;player.locked=false;player.lastQuestionIndex=d.questionIndex}renderPlayerQuestion(d);startPlayerTimer(d.question.endsAt,d.question.time)}if(d.phase==='result'){clearInterval(playerTimer);renderPlayerResult(d,me)}if(d.phase==='final'){clearInterval(playerTimer);renderPlayerFinal(d)}}
function playerShell(content,danger=false){app.innerHTML=`<main class="min-h-screen p-4 speed-bg safe ${danger?'!bg-red-900':''}"><header class="flex items-center justify-between mb-4"><img src="${ASICS_LOGO}" class="w-32 bg-white rounded-xl px-4 py-3"><div class="text-right"><div data-conn class="inline-flex items-center gap-1 rounded-full px-3 py-1 text-xs font-black ${player.connected?'bg-green-400 text-[#001E62]':'bg-red-500 text-white'}">${icon(player.connected?'wifi':'off','w-3 h-3')}${player.connected?'接続中':'再接続中'}</div><p class="text-yellow-300 font-black mt-1">${esc(roomId)}</p></div></header>${content}</main>`}
function renderPlayerWaiting(msg){playerShell(`<section class="glass rounded-[2rem] p-7 text-center fade min-h-[72vh] flex flex-col justify-center"><div class="text-yellow-300 mx-auto mb-6">${icon('phone','w-20 h-20')}</div><h1 class="text-3xl font-black mb-4">待機中</h1><p class="text-blue-100 text-lg">${esc(msg)}</p><div class="mt-8 rounded-2xl bg-white/10 p-5"><p class="text-blue-100 font-bold">あなたの名前</p><p class="text-3xl font-black">${esc(player.name)}</p></div></section>`)}
function renderPlayerQuestion(d){const q=d.question;playerShell(`<section class="fade"><div class="glass rounded-[2rem] p-5 mb-4"><div class="flex justify-between gap-3 items-center mb-3"><p class="text-yellow-300 font-black">第 ${d.questionIndex+1} 問 / ${d.totalQuestions}</p><div id="pTimeBox" class="rounded-2xl bg-white text-[#001E62] px-4 py-2 text-center"><p class="text-xs font-bold">残り</p><p id="pTime" class="text-3xl font-black">${q.time}</p></div></div><div class="h-3 bg-white/20 rounded-full overflow-hidden mb-4"><div id="pTimeBar" class="soft-update h-full bg-yellow-300" style="width:100%"></div></div><h1 class="text-xl font-black leading-snug">${esc(q.q)}</h1></div><div class="space-y-3">${q.options.map((op,i)=>`<button ${player.locked?'disabled':''} onclick="sendAnswer(${i})" class="opt btn w-full rounded-3xl p-5 text-left font-black text-lg shadow-2xl ${player.selected===i?'bg-yellow-300 text-[#001E62]':'bg-white text-[#001E62]'} ${player.locked&&player.selected!==i?'opacity-45':''}"><div class="flex items-center gap-4"><span class="shrink-0 w-11 h-11 rounded-full bg-[#001E62] text-white flex items-center justify-center">${String.fromCharCode(65+i)}</span><span>${esc(op)}</span></div></button>`).join('')}</div><div class="mt-4 glass rounded-2xl p-4 text-center"><p class="${player.locked?'text-yellow-300':'text-blue-100'} font-black">${player.locked?'送信しました。大画面をご覧ください。':'答えを1つ選んでください。'}</p><p class="mt-2 text-sm text-blue-100">現在の失誤：${player.wrong} / ${MAX_WRONG}</p></div></section>`)}
function startPlayerTimer(endsAt,total){clearInterval(playerTimer);function tick(){const left=Math.max(0,Math.ceil((endsAt-Date.now())/1000));const t=document.getElementById('pTime'),bar=document.getElementById('pTimeBar'),box=document.getElementById('pTimeBox');if(t)t.textContent=left;if(bar){bar.style.width=Math.max(0,left/total*100)+'%';bar.className=`soft-update h-full ${left<=5?'bg-red-500':'bg-yellow-300'}`}if(box)box.className=`rounded-2xl ${left<=5?'bg-red-500 text-white':'bg-white text-[#001E62]'} px-4 py-2 text-center`;if(left<=0)clearInterval(playerTimer)}tick();playerTimer=setInterval(tick,250)}
function sendAnswer(i){if(player.locked||player.eliminated)return;player.selected=i;player.locked=true;publish(`${baseTopic}/player`,{type:'answer',id:player.id,answer:i});document.querySelectorAll('button[onclick^="sendAnswer"]').forEach((b,idx)=>{b.disabled=true;if(idx===i){b.className=b.className.replace('bg-white text-[#001E62]','bg-yellow-300 text-[#001E62]')}else b.classList.add('opacity-45')});const msg=document.querySelector('.glass.rounded-2xl p');if(msg){msg.textContent='送信しました。大画面をご覧ください。';msg.className='text-yellow-300 font-black'}toast('送信しました。')}
function renderPlayerResult(d,me){const r=d.result,ok=me&&me.lastCorrect===true;playerShell(`<section class="glass rounded-[2rem] p-5 text-center fade"><div class="${ok?'text-green-300':'text-red-300'} mx-auto mb-4">${icon(ok?'check':'x','w-20 h-20')}</div><h1 class="text-4xl font-black ${ok?'text-green-300':'text-red-300'} mb-4">${ok?'正解です！':'残念、不正解です'}</h1><div class="rounded-3xl bg-white text-[#001E62] p-5 mb-4"><p class="font-bold mb-1">正解</p><p class="text-2xl font-black">${String.fromCharCode(65+r.correct)}. ${esc(r.correctText)}</p></div><img src="${r.img}" class="rounded-3xl w-full mb-4 bg-white/10"><div class="rounded-3xl bg-white/10 p-4 mb-4 text-left"><p class="text-yellow-300 font-black mb-2">ひとこと解説</p><p class="font-bold leading-relaxed">${esc(r.explain)}</p></div><div class="rounded-3xl bg-white/10 p-4"><p class="text-blue-100 font-bold">あなたの失誤</p><p class="text-5xl font-black ${player.wrong>=4?'text-red-300':'text-yellow-300'}">${player.wrong} / ${MAX_WRONG}</p></div><p class="mt-4 text-blue-100">次の問題までお待ちください。</p></section>`)}
function renderPlayerEliminated(){playerShell(`<section class="rounded-[2rem] bg-red-700/90 border border-red-300 p-8 text-center fade min-h-[78vh] flex flex-col items-center justify-center"><div class="mb-6">${icon('skull','w-32 h-32')}</div><h1 class="text-6xl font-black mb-4">脱落</h1><p class="text-xl font-bold mb-6">失誤が${MAX_WRONG}回に達しました。</p><div class="rounded-3xl bg-white text-red-700 p-6 w-full"><p class="font-bold">最終スコア</p><p class="text-5xl font-black">${player.score}</p></div><p class="mt-6 text-red-100">以降の問題には回答できません。大画面をご覧ください。</p></section>`,true)}
function renderPlayerFinal(d){const rk=d.ranking||[];playerShell(`<section class="glass rounded-[2rem] p-6 text-center fade"><div class="text-yellow-300 mx-auto mb-5">${icon('trophy','w-24 h-24')}</div><h1 class="text-4xl font-black mb-6">お疲れさまでした！</h1><div class="rounded-3xl bg-white text-[#001E62] p-6 mb-6"><p class="font-bold">あなたのスコア</p><p class="text-6xl font-black">${player.score}</p><p class="font-bold mt-2">失誤 ${player.wrong} / ${MAX_WRONG}</p></div><h2 class="text-2xl font-black mb-4">TOP 5</h2><div class="space-y-3">${rk.map((p,i)=>`<div class="rounded-2xl bg-white/10 p-4 flex justify-between items-center"><div class="text-left"><p class="font-black">${i+1}. ${esc(p.name)}</p><p class="text-xs text-blue-100">${p.eliminated?'脱落':'生存'}・失誤 ${p.wrong}/${MAX_WRONG}</p></div><p class="text-2xl font-black text-yellow-300">${p.score}</p></div>`).join('')}</div></section>`)}
</script>
</body>
</html>
